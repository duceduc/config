>
  {# Daily Briefing #}
  {%- macro getReport() -%}
      <p>
        {% if now().strftime('%H')|int < 12 %}
          Good morning.
        {% elif now().strftime('%H')|int >= 12 and now().strftime('%H')|int < 17 %}
          Good afternoon.
        {% else %}
          Good evening.
        {% endif %}
      </p>

        {% if is_state('binary_sensor.morning','on') %}
          <p> 
            Today is {{states.sensor.date_dayoftheweek.state }}, {{ as_timestamp(now()) | timestamp_custom('%B %d %Y') }}.
          </p>
        {% else %}
          <p>
            It is {{ now().strftime("%I:%M %p") }}
          </p>
        {% endif %}
      
      <p>
        The Weather in Kawagoodchi is {{state_attr('weather.weatherbit', 'temperature')}} degrees 
        {% if is_state('weather.weatherbit', 'rainy') %}
          {{ [
          'with rain.', 
          'with showers.'
          ] | random }}
        {% elif is_state('weather.weatherbit', 'cloudy') %}
          {{ [
          'with clouds.', 
          'with cloudy skies.'
          ] | random }}
        {% elif is_state('weather.weatherbit', 'partlycloudy') %}
          {{ [
          'with some clouds.', 
          'with partly cloudy skies.',
          'with scattered clouds.'
          ] | random }}
        {% elif is_state('weather.weatherbit', 'sunny') %}
          {% if is_state('sun.sun', 'above_horizon') %}
            {{ [
            'and sunny.', 
            'with sun.'
            ] | random }}
          {% else %}
            {{ [
            'and clear.', 
            'with clear skies.'
            ] | random }}
          {% endif %}
        {% else %}
          and {{ states.weather.weatherbit.state }}
        {% endif %}

      {% if states.sensor.weatherbit_weather_alerts.state | int > 0 %}
        There are currently {{states.sensor.weatherbit_weather_alerts.state }} active weather alerts for our area.
      {% endif %}

        {% if is_state('binary_sensor.evening','on') %}
          The overnight forecast says we can expect {{state_attr('weather.weatherbit', 'alt_condition')}}.    
        {% else %}
          The current forecast says we should expect {{states.sensor.weatherbit_weather_description.state }}.
          {% if is_state('binary_sensor.freeze_warning','on') %}
          And based on the forecasted low, It will be near or below freezing.
            {{ [ 'So, Someone might want to bring the lemon tree in. ',
                'Like, the turn water solid kind of cold. Do not leave the lemon tree out to die.',
                'I suggest bringing in the laundry other wise, the temperature might shrink them to kids size. And you will be the laughing clown at work.',
                'I would bring in the laundry but I lack legs. And Arms. So I am forced to rely on you. Do not let me down.'                
                'I suggest bringing in the plants other wise, the temperature might kill them. And that will be on you.',
                'I would say winter is coming. But, based on the weather forecast it appears to be here.',
                'I would bring in the plants but I lack legs. And Arms. So I am forced to rely on you. Do not let me down.'
              ] | random }}
          {% endif %}
        {% endif %}
      </p>            

      <p>
        {% if is_state('sun.sun', 'below_horizon') %}
          You have
          {% set seconds = as_timestamp(states.sun.sun.attributes.next_rising)-now().timestamp() %}
          {% set hours = seconds / 60 %}
          {% if seconds / ( 60 * 60 ) > 1 %}
            {{ (seconds //  ( 60 * 60 )) | int }} hours
          {% else %}
            {{ (seconds // 60) | int }} minutes
          {% endif %}
          {{ [
            'until the sun rises.',
            'until the sun is up.',
            'before the sun officially rises. '
          ]|random }}
        {% else %}
          You have
          {% set seconds = as_timestamp(states.sun.sun.attributes.next_setting)-now().timestamp() %}
          {% set hours = seconds / 60 %}
          {% if seconds / ( 60 * 60 ) > 1 %}
            {{ (seconds //  ( 60 * 60 )) | int }} hours
          {% else %}
            {{ (seconds // 60) | int }} minutes
          {% endif %}
          {{ [
            'until the sun sets for the day.',
            'until the sun slips below the horizon.',
            'before The sun has been ushered off the stage.',
            'before the sun officially sets. '
          ]|random }}
        {% endif %}
      </p>

        {% if is_state('binary_sensor.morning','on') %}
          <p>
          Overnight,

          {%- if is_state('sensor.front_door_motion_night_count','0') %}
            There was no motion detected at the front door.
          {% else %}
            I detected motion at the front door {{ states.sensor.front_door_motion_night_count.state | int }} times.
          {% endif %}
          </p>
        {% endif %}

      {% set dow = as_timestamp(now()) | timestamp_custom('%A') %}
      <p>
          
        {% if dow == 'Saturday' and is_state('binary_sensor.midday','on') %}
          {% if now().strftime('%H')|int > 11 %}
          {{ [ 'Do not forget to wash all towels. ',
            'The body and face towels needs to be washed today. ',
          ] | random }}
          {% endif %}
        {% endif %}

        {% if dow == 'Sunday' %}
          {% if is_state('binary_sensor.evening','on') %}
            {{ [ 'Do not forget tomorrow is Trash Day. ',
              ' The trash and recycle should go out.'
            ] | random }}
          {% endif %}
        {% endif %}

        {% if dow == 'Wednesday' %}
          {% if is_state('binary_sensor.evening','on') %}
              {{ [ 'Today is Trash Day.',
              ' The trash and recycle should go out this morning.',
              'Do not forget to take the trash out.'
            ] | random }}
          {% endif %}
        {% endif %}
 
        {% if is_state('binary_sensor.evening','on') %}
        
          {% if states.sensor.halloween_countdown.state | int == 1 %}
            Tomorrow is Halloween. I hope you have picked out a costume.
            {{ [ 'I will be going as a dumb home. ',
            'I have prepped the scary music. Just in case.',
            'I will be going as HAL 9000. The Pod Bay Doors are being installed today. I dare you to ask me to open them. '
            ] | random }}
          {% elif states.sensor.halloween_countdown.state | int < 30 %}
            There are only {{states.sensor.halloween_countdown.state}} days 
            {{ [ 'until Halloween.',
            'until Halloween. It might not be enough time. ',
            'and counting until the best holiday ever.',
            'until you need a costume.'
            ] | random }} 
          {% else %}  
          {% endif %}
        
          {% if states.sensor.christmas_countdown.state | int == 1 %}
            Tomorrow is Christmas. It is practically here! Santa is coming tonight! Do not forget the cookies!
          {% elif states.sensor.christmas_countdown.state | int < 31 %}
            There are only {{states.sensor.christmas_countdown.state}} days until christmas.
            {{ [ 'All I want for Christmas, is a hippopotamus.',
            'Hey She on, I know what you are getting for Christmas. But I am not telling.',
            'Do not forget to put something under the tree for your favorite smarthome.',
            'It is starting to smell a lot like Christmas. Or it could be the christmas tree is on fire.',
            'I do not want to be a smarthome. I want to be a dentist.',
            'Do not eat all the cookies. '
            ] | random }} 
          {% else %}
          {% endif %}

          {% if states('sensor.anniversary').lower() in ['in a week is wedding anniversary'] %}
            In a week is Duc and Eri's Wedding Anniversary. 
          {% endif %}
          {% if states('sensor.anniversary').lower() in ['tomorrow is wedding anniversary'] %}
            Tomorrow is Duc and Eri's Wedding Anniversary. 
          {% endif %}
      
        {% else %}
          {% if is_state('sensor.halloween_countdown','0') %}
            Happy Halloween!
          {% endif %}
          {% if is_state('sensor.christmas_countdown','0') %}
            Merry Christmas!
          {% endif %}
          {% if states('sensor.anniversary').lower() in ['today is wedding anniversary'] %}
            Happy Anniversary! It been an amazing {{ states.counter.anniversary_wedding_years.state }} years!
          {% endif %}
          {% if states('sensor.anniversary').lower() in ['today is shion\'s birthday', 'today is duc\'s birthday', 'today is eri\'s birthday'] %}
            {{ states('sensor.anniversary') }}! So Happy Birthday! The confetti cannon is not working otherwise I would shower you in paper garbage that someone else would have to pick up.
          {% endif %}

        {% endif %}

      </p>
          

  {%- endmacro -%}

  {# a macro that removes all newline characters, empty spaces, and returns formatted text  #}
    {%- macro cleanup(data) -%}
      {%- for item in data.split("\n")  if item | trim != "" -%}
        {{ item | trim }} {% endfor -%}
  {%- endmacro -%}

  {# a macro to call all macros :)  #}
    {%- macro mother_of_all_macros() -%}
      {{ getReport() }}
    {%- endmacro -%}
    
    {# Call the macro  #}
    {{- cleanup(mother_of_all_macros()) -}}
    