>
  {# Morning Report #}
  {%- macro getReport() -%}
    <p>
        {% if now().strftime('%H')|int < 12 %}
          Good morning.
        {% elif now().strftime('%H')|int >= 12 and now().strftime('%H')|int < 17 %}
          Good afternoon.
        {% else %}
          Good evening.
        {% endif %}
      </p>
      
      <p>
      {% if now().strftime('%H')|int < 12 %}
        {% if now().strftime('%M')|int == 0 %}
          It is {{ now().strftime('%H')|int }} AM.
        {% else %}
          It is {{ now().strftime('%H')|int }} {{ now().strftime('%M')|int }} AM.
        {% endif %}

      {% elif now().strftime('%H')|int > 12 %}
        {% if now().strftime('%M')|int == 0 %}
          It is {{ now().strftime('%H')|int }} PM.
        {% else %}
          It is {{ now().strftime('%H')|int }} {{ now().strftime('%M')|int }} PM.
        {% endif %}
      
      {% else %}

      {% endif %}
      </p>
      
      <p>
      {{ [
          'Today is ',
          'If you have not been keeping track today is ',
          'Do you know what day of the week it is? Today is ',
          'I hate to be the bearer of bad news, but today is '
      ]|random }}
      {{states.sensor.date_dayoftheweek.state }}.
      </p>
      
      <p>
        It is currently {{states.sensor.weatherbit_weather_description.state }} and {{states.sensor.oa_temperature.state|round}} degrees in Kawagoodchi. 
      </p>
      
      <p>
        {% if states.sensor.weatherbit_weather_alerts.state | int > 0 %}
          There are currently {{states.sensor.weatherbit_weather_alerts.state }} active weather alerts for our area.
          The National Weather Service Has issued,
          {% if states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[5] is defined %}
            a {{ states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[5] }}.
          {% elif states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[4] is defined %}
          a {{ states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[4] }}.
          {% elif states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[3] is defined %}
            a {{ states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[3] }}.
          {% elif states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[2] is defined %}
            a {{ states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[2] }}.
          {% elif states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[1] is defined %}
            a {{ states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[1] }}.
          {% else %}
            a {{ states.sensor.nws_alerts.attributes.spoken_desc.split('\n\n-\n\n')[0] }}.
          {% endif %}
        {% endif %}
      </p>
      
      <p>
        {{ [
            'The rest of the day should be,',
            'Todays forecast should be,'
        ]|random }}
          {{ states.weather.weatherbit.state }}. 
        </p>
        
        <p>
          {% if is_state('sensor.date_dayoftheweek', 'Sunday') %}
            {% if now().strftime('%H')|int > 17 %}
            {{ [ 'Do not forget tomorrow is Trash Day. ',
              'I advise you collect all trash and carry down to the trash room. ',
              'The trash should go out.'
            ] | random }}
            {% endif %}
          {% endif %}
        </p>
        
        <p>
        {% if is_state('sensor.halloween_countdown','0') %}
          Happy Halloween!
        {% endif %}
        {% if is_state('sensor.christmas_countdown','0') %}
          Merry Christmas Everyone!
        {% endif %}
        {% if states('sensor.anniversary').lower() in ['today is wedding anniversary'] %}
          Happy Anniversary! It's been an amazing {{ states.counter.anniversary_wedding_years.state }} years!
        {% endif %}
        </p>
        
        <p>
          {% if is_state('sensor.date_weekday', 'on') %}
             {%- if states.sensor.duc_destinations.state|round > 45 %}
               Traffic to jcb office appears heavy than normnal.
             {% else %}
               Traffic to the jcb office is normal.
             {% endif %}
             Currently it will take {{states.sensor.duc_destinations.state|round}} minutes to get to the jcb office.

             {%- if states.sensor.eri_destinations.state|round > 55 %}
               Traffic to kawasaki costco appears heavy than normnal.
             {% else %}
               Traffic to the kawasaki costco is normal.
             {% endif %}
             Currently it will take {{states.sensor.eri_destinations.state|round}} minutes to get to the kawasaki costco.
          {% endif %}
      </p>
      
  {%- endmacro -%}

  {# a macro that removes all newline characters, empty spaces, and returns formatted text  #}
    {%- macro cleanup(data) -%}
      {%- for item in data.split("\n")  if item | trim != "" -%}
        {{ item | trim }} {% endfor -%}
  {%- endmacro -%}

  {# a macro to call all macros :)  #}
    {%- macro mother_of_all_macros() -%}
      {{ getReport() }}
    {%- endmacro -%}
    
    {# Call the macro  #}
    {{- cleanup(mother_of_all_macros()) -}}
    