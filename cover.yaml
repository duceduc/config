#########################################################
#                                                                                                              #
#             Node.js Switchbot                                                                         #
#                                                                                                              #
#########################################################

  - platform: template
    covers:
      computer_room_curtains:
        device_class: curtain
        friendly_name: "Computer Room Curtains"
        value_template: >-
          {% if states('sensor.cr_curtain_left_position')|float < 90 %}
            open
          {% else %}
            closed
          {% endif %}
        open_cover:
          service: script.enable_cr_curtain_tpl
          data:
            modus: "open"
        close_cover:
          service: script.enable_cr_curtain_tpl
          data:
            modus: "close"
        stop_cover:
          service: script.enable_cr_curtain_tpl
          data:
            modus: "stop"
        set_cover_position:
          service: script.enable_cr_curtain_tpl
          data_template:
            position: "{{ position }}"
            modus: "position"
        icon_template: >-
          {% if is_state('cover.computer_room_curtains', 'open') %}
            mdi:blinds-open
          {% else %}
             mdi:blinds
          {% endif %}

