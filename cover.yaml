#########################################################
#                                                                                                              #
#             Node.js Group Switchbot                                                                 #
#                                                                                                              #
#########################################################

  - platform: template
    covers:
      fr_curtains:
        friendly_name: "Front Room Curtains"
        open_cover:
          service: script.fr_curtains
          data:
            modus: "open"
        close_cover:
          service: script.fr_curtains
          data:
            modus: "close"
        stop_cover:
          service: script.fr_curtains
          data:
            modus: "stop"
        set_cover_position:
          service: script.fr_curtains_position
          data:
            position: "{{position}}"
        value_template: "{{is_state('sensor.fr_curtains', 'open')}}"
        icon_template: >-
          {% if is_state('sensor.fr_curtains', 'open') %}
            mdi:window-open
          {% else %}
            mdi:window-closed
          {% endif %}

