# Node.js: sensor.cr_curtain_left_position
# MQTT: sensor.cr_curtains_left_position

  - platform: template
    covers:
      computer_room_curtain:
        device_class: curtain
        friendly_name: "Computer Room Curtain"
        value_template: >-
          {% if states('sensor.cr_curtains_left_position')|float < 90 %}
            open
          {% else %}
            closed
          {% endif %}
        open_cover:
          service: script.enable_cr_curtains_tpl
          data:
            modus: "open"
            bot: 'cr_curtain_lt'
        close_cover:
          service: script.enable_cr_curtains_tpl
          data:
            modus: "close"
            bot: 'cr_curtain_lt'
        stop_cover:
          service: script.enable_cr_curtains_tpl
          data:
