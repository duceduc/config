#########################################################
#                                                                                                              #
#             Enable Tv Lock                                                                             #
#                                                                                                              #
#########################################################


- alias: enable tv lock
  variables:
    digit: 6
  trigger:
    - platform: template
      value_template: '{{ states.sensor.time.state == states.input_datetime.tv_lock_time.state[0:5] }}'
  condition:
    - condition: template # Child mode is on
      value_template: "{{ is_state('input_boolean.child_mode', 'on') }}"
    - condition: template # Someone is home
      value_template: "{{ is_state('group.family_presence', 'on') }}"
    - condition: template # Is weekday
      value_template: "{{ is_state('sensor.date_weekday', 'on') }}"
  action:
    - service: notify.alexa_media
      data_template:
        data:
          type: tts
        target:
         - media_player.ai_1
        message: "<audio src='https://ha.snailmsg.com/local/alerts/en/minecraft-theme.mp3'/> The time is {{ now().hour }} {{ now().minute }}, The tv will shutoff in {{ digit }} minutes."
    - delay:
        minutes: "{{ digit }}"
    - condition: template # Child mode is on
      value_template: "{{ is_state('input_boolean.child_mode', 'on') }}"
    - service: switch.turn_on
      entity_id: switch.tv_lock


#########################################################
#                                                                                                              #
#             Disable Tv Lock                                                                             #
#                                                                                                              #
#########################################################


- alias: disable tv lock
  trigger:
    - platform: time
      at: '01:00:00'
  condition:
    - condition: template
      value_template: "{{ is_state('switch.tv_lock', 'on') }}"
  action:
    - service: switch.turn_off
      entity_id: switch.tv_lock


#########################################################
#                                                                                                              #
#             END OF CONFIGURATION FILE                                                          #
#                                                                                                              #
#########################################################