#########################################################
#                                                                                                              #
#                   MORNING BRIEFING                                                                  #
#                                                                                                              #
#########################################################


  - alias: "Morning Briefing Duc"
    initial_state: true
    trigger:
      - platform: time
        at: '06:00:00'
    action:
      - service: notify.home_assistant
        data_template:
          title: "Morning Briefing"
          message: >
            <b>Today is {{ now().strftime( '%B %d, %Y') }} </b> <br>
            <br>
            <b> Today's Weather </b> <br>
            The current temperature is {{state_attr('weather.weatherbit_shimotoda', 'temperature')}} degrees Celsius with a forecast of {{ states.weather.weatherbit_shimotoda.attributes.forecast[0].condition }}. The low temperature today is {{ states.weather.weatherbit_shimotoda.attributes.forecast[0].templow }} degrees Celsius with a high of {{ states.weather.weatherbit_shimotoda.attributes.forecast[0].temperature }}. <br>
            The predicted precipitation today is {% if states.weather.weatherbit_shimotoda.attributes.forecast[0].precipitation == None %} 0 mm. {% else %} {{ states.weather.weatherbit_shimotoda.attributes.forecast[0].precipitation }} mm. {% endif %} <br>
            <br>
            <b> Holiday's & Birthdays </b> <br>
            {% if is_state('sensor.holiday', '') %} No Holidays or Birthdays Today {% else %}Today is {{ states.sensor.holiday.state}}.{% endif %} <br>
            {% if is_state('sensor.holidaytomorrow', '') %} {% else %}Tomorrow is {{ states.sensor.holidaytomorrow.state}}.{% endif %} <br>
            {% if is_state('sensor.holidayinaweek', '') %} {% else %} {{ states.sensor.holidayinaweek.state}} is in one week.{% endif %} <br>
            <br>
            <b> A Picture of Us! </b>
          data:
            images:
            - /config/www/img/private/{{ range(1, 25) | random }}.jpg 

