#########################################################
#                                                                                                              #
#             Open Front Curtains                                                                      #
#                                                                                                              #
#########################################################


- alias: 'Open Front Curtains at Sunrise'
  trigger:
    - entity_id: sensor.period_of_the_day
      platform: state
      to:
       - 'dawnlight'
       - 'daylight'
  condition:
    - condition: template # Someone is home
      value_template: "{{ is_state('input_select.home_mode', 'Home') }}"
  action:
    - service: cover.set_cover_position
      data:
        position: '{% if is_state("sensor.period_of_the_day", "dawnlight") %} 50 {% else %} 100 {% endif %}'
        entity_id:
        - cover.fr_curtains


#########################################################
#                                                                                                              #
#             Close Front Curtains                                                                      #
#                                                                                                              #
#########################################################


- alias: 'Close Front Curtains at Sunset'
  trigger:
    - entity_id: sensor.period_of_the_day
      platform: state
      to:
       - 'dusklight'
       - 'nightlight'
  condition:
    - condition: template 
      value_template: "{{ states('sensor.fr_curtains') != 'closed' }}"
  action:
    - service: cover.set_cover_position
      data:
        position: '{% if is_state("sensor.period_of_the_day", "dusklight") %} 50 {% else %} 0 {% endif %}'
        entity_id:
        - cover.fr_curtains

#########################################################
#                                                                                                              #
#             Livingroom Lights on when low light                                                  #
#                                                                                                              #
#########################################################

- alias: 'livingroom lights on when dark'
  trigger:
    - platform: numeric_state
      entity_id: sensor.front_illuminance
      above: 0.19
  condition:
    - condition: template # Someone is home
      value_template: "{{ is_state('input_select.home_mode', 'Home') }}"
  action:
    - service: light.turn_on
      data:
        entity_id: light.computer_room
        transition: 600
        brightness_pct: 60
        
    - condition: or
      conditions:
        - condition: template # Is the weekend
          value_template: "{{ is_state('sensor.date_weekday', 'off') }}" 
        - condition: template # Is a holiday
          value_template: "{{ states('sensor.holiday')| trim != '' }}"
    - service: light.turn_on
      data:
        entity_id: light.living_room

#########################################################
#                                                                                                              #
#             END OF CONFIGURATION FILE                                                          #
#                                                                                                              #
#########################################################