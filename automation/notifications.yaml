#########################################################

- alias: "Replace Toilet Airfreshener Notification"
  trigger:
    - platform: numeric_state
      entity_id: counter.toilet_airfreshener
      above: 350
  action:
    - service: script.email_notify
      data:
        title: "Replace Toilet Airfreshener"
