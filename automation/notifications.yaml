#########################################################
#                                                                                                              #
#                   Windows Desktop Notification                                                    #
#                                                                                                              #
#########################################################

##notify.desktop works, but log still shows error.##
  - alias: school time notification
    trigger:
      - platform: time
        at: '07:19:00'
    condition:
      - condition: template # is the weekday
        value_template: "{{ is_state('sensor.date_weekday', 'on') }}"
      - condition: template # pc is on
        value_template: "{{ is_state('binary_sensor.desktop_connected', 'on') }}"
    action:
      - service: notify.desktop
        data_template:
          message: "Time for Shion to go to   school."


#########################################################
#                                                                                                              #
#                   Vehicles Delivery Notifications                                                    #
#                                                                                                              #
#########################################################


  - alias: "Vehicle Delivery Notification"
    initial_state: true
    trigger:
      - platform: state
        entity_id:
         - sensor.deliveryin2week
    condition:
      - condition: template
        value_template: "{{ states('sensor.deliveryin2week') != 'unknown' }}"
      - condition: template
        value_template: "{{ states.sensor.deliveryin2week.state | trim != '' }}"
    action:
      - service: notify.jcb
        data_template:
          title: "Vehicle Delivery Notification"
          message: >
            <b>Today is {{ now().strftime( '%B %d, %Y') }} </b> <br>
            <br>
            <b> List of Containers/Vehicles Arriving Soon </b> <br>
            {% if is_state('sensor.deliveryin2week', '') %} There are no vehicles. {% else %} The following units are arriving in about 10 days. Please make arrangement to have BL send to customers.<br><br> {{ states('sensor.deliveryin2week') }} {% endif %} <br>
            <br>
          data:
            images: []

#########################################################
#                                                                                                              #
#      HOLIDAY / BIRTHDAY                                                                            #
#                                                                                                              #
#########################################################

  - alias: "Holiday and Birthday Notification"
    initial_state: true
    trigger:
      - platform: state
        entity_id:
          - sensor.holiday
    condition:
      - condition: template
        value_template: "{{ states('sensor.holiday') != 'unknown' }}"
      - condition: template
        value_template: "{{ states.sensor.holiday.state | trim != '' }}"
    action:
      - service: notify.mobile_app_id
        data:
          message: 'Today is {{ states.sensor.holiday.state }}.'
          title: '{{ states.sensor.holiday.state }}'


#########################################################
#                                                                                                              #
#      SSL Certificate Expiry Notification                                                           #
#                                                                                                              #
#########################################################

  - alias: "VJ SSL Certificate Expiry Notification"
    initial_state: true
    trigger:
      - platform: numeric_state
        entity_id: sensor.vj_ssl_cert_expiry
        below: 3
    action:
      - service: notify.home_assistant
        data_template:
          title: "Certificate Expiring in {{ states.sensor.vj_ssl_cert_expiry.state }} Days: {{ states('sensor.vj_ssl_cert_cn') }}"
          message: >-
            {% set s =states('sensor.vj_ssl_cert_issuer') %}
            {% set site = (s|regex_findall_index('O=[a-zA-Z]+',0)).replace('O=','') %}
            <b>Today is {{ now().strftime( '%B %d, %Y') }} </b> <br>
            <br>
            This is to notify you that your certificate with the common name {{ states('sensor.vj_ssl_cert_cn') }} will expire in {{ states.sensor.vj_ssl_cert_expiry.state }} days. <br>
            To renew your certificate, please visit <a href="https://my.gogetssl.com/en/user/">{{ site }}</a>.<br>
            <br>
          data:
            images: []

  - alias: "HA SSL Certificate Expiry Notification"
    initial_state: true
    variables:
      cn: >-
       {% set str=states.sensor.ha_ssl_cert_cn.state %}
       {% set cn=(str|regex_findall_index('[a-zA-Z]{2,}?\.[a-zA-Z]{1,}',1)) %}
       {{ cn }}
    trigger:
      - platform: numeric_state
        entity_id: sensor.ha_ssl_cert_expiry
        below: 3
    action:
      - service: notify.home_assistant
        data_template:
          title: "Certificate Expiring in {{ states.sensor.ha_ssl_cert_expiry.state }} Days: {{cn}}"
          message: >-
            <b>Today is {{ now().strftime( '%B %d, %Y') }} </b> <br>
            <br>
            This is to notify you that your certificate with the common name {{cn}} will expire in {{ states.sensor.ha_ssl_cert_expiry.state }} days. <br>
            <br>
          data:
            images: []

  - alias: "Mqtt SSL Certificate Expiry Notification"
    initial_state: true
    variables:
      cn: >-
       {% set str=states.sensor.mqtt_ssl_cert_cn.state %}
       {% set cn=(str|regex_findall_index('[a-zA-Z]{2,}',7)) %}
       {{ cn }}
    trigger:
      - platform: numeric_state
        entity_id: sensor.mqtt_ssl_cert_expiry
        below: 3
    action:
      - service: notify.home_assistant
        data_template:
          title: "Certificate Expiring in {{ states.sensor.mqtt_ssl_cert_expiry.state }} Days: {{ cn }}"
          message: >-
            <b>Today is {{ now().strftime( '%B %d, %Y') }} </b> <br>
            <br>
            This is to notify you that your certificate with the common name {{cn}} will expire in {{ states.sensor.mqtt_ssl_cert_expiry.state }} days. <br>
            <br>
          data:
            images: []

