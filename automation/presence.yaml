      data:
        entity_id: input_boolean.eri_presence
- alias: Presence Eri Off
  trigger:
    - platform: numeric_state
      entity_id: sensor.ie_presence
      below: 10
  action:
    - service: input_boolean.turn_off
      data:
        entity_id: input_boolean.eri_presence

