#########################################################
#                                                                                                              #
#            Arrival | Departure Scan                                                                  #
#                                                                                                              #
#########################################################


- alias: Presence Scan Departure
  trigger:
    - platform: state
      entity_id: binary_sensor.genkan_door
      to: 'on'
  action:
    - delay: '00:02:00'
    - service: mqtt.publish
      data_template:
        topic: monitor/scan/depart

- alias: Presence Scan Arrival
  trigger:
    - platform: state
      entity_id: binary_sensor.motion_g1_occupancy
      to: 'on'
  action:
    - service: mqtt.publish
      data_template:
        topic: monitor/scan/arrive


#########################################################
#                                                                                                              #
#            Away|Home|Returning|Vacation status                                              #
#                                                                                                              #
#########################################################

# Home
- alias: Home Mode - Arriving
  trigger:
    - platform: state
      entity_id: sensor.n_people_home
  condition:
    - condition: template
      value_template: "{{ not is_state('input_boolean.vacation_mode', 'on') }}"
    - condition: template
      value_template: >
        {{ trigger.to_state.state|int > trigger.from_state.state|int }}
  action:
    - service: input_select.select_option
      entity_id: input_select.home_mode
      data:
        option: 'Home'

# Away
- alias: Home Mode - Leaving
  trigger:
    - platform: numeric_state
      entity_id: sensor.n_people_home
      below: 1
  condition:
    - condition: template
      value_template: "{{ not is_state('input_boolean.vacation_mode', 'on') }}"
    - condition: state
      entity_id: input_select.home_mode
      state: Home
  action:
    - service: input_select.select_option
      entity_id: input_select.home_mode
      data:
        option: 'Away'
    - service: script.dev_check # turn off any devices that was left on

# Returning
- alias: Home Mode - Returning
  trigger:
    - platform: state
      entity_id:
       - binary_sensor.duc_home
       - binary_sensor.eri_home
      to: 'on'
  condition:
    - condition: template
      value_template: "{{ is_state('input_select.home_mode', 'Away') or is_state('input_select.home_mode', 'Vacation') }}"
  action:
    - service: input_select.select_option
      entity_id: input_select.home_mode
      data:
        option: 'Returning'

# Vacation
- alias: Home Mode - Vacation
  trigger:
  - platform: state
    entity_id: input_boolean.vacation_mode
  action:
    choose:
      - conditions: >
           {{ states.input_boolean.vacation_mode.state == 'on' }}
        sequence:
          - service: input_select.select_option
            entity_id: input_select.home_mode
            data:
              option: 'Vacation'
      - conditions: >
           {{ states.input_boolean.vacation_mode.state == 'off' and
              states.sensor.n_people_home.state | int  <= 2 }}
        sequence:
          - service: input_select.select_option
            entity_id: input_select.home_mode
            data:
              option: 'Away'
      - conditions: >
           {{ states.input_boolean.vacation_mode.state == 'off' and
              states.sensor.n_people_home.state | int  > 2 }}
        sequence:
          - service: input_select.select_option
            entity_id: input_select.home_mode
            data:
              option: 'Home'


#########################################################
#                                                                                                              #
#             END OF CONFIGURATION FILE                                                          #
#                                                                                                              #
#########################################################