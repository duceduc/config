#########################################################
#                                                                                                              
#             Randomize Vacation Lights                                                                            
#                                                                                                              
#########################################################


- alias: Randomize Vacation Lights
  trigger:
  - platform: state
    entity_id: input_boolean.randomize_vacation_lights
  condition:
    - condition: state
      entity_id: input_boolean.vacation_mode
      state: 'on'
  action: 
    - service_template: >
        {% if is_state('input_boolean.randomize_vacation_lights', 'on' )%} script.turn_on {% else %}
           script.turn_off
        {% endif %}
 
      data:
        entity_id: script.randomize_vacation_lights   

- alias: Run Vacation Lights
  trigger:
    - platform: sun
      event: sunset
      id: sundown
    - platform: sun
      event: sunrise
      id: sunup
    - platform: state
      entity_id: input_boolean.vacation_mode
      id: cancel
      from: 'on'
      to: 'off'
  action:
    - choose:
      - conditions:
        - condition: trigger
          id: sundown
        - condition: state
          entity_id: input_boolean.vacation_mode
          state: 'on'
        sequence:
          - service: input_boolean.turn_on
            entity_id: input_boolean.randomize_vacation_lights
      - conditions:
        - condition: or
          conditions:
          - condition: trigger
            id: sunup
          - condition: trigger
            id: cancel
        sequence:
          - service: input_boolean.turn_off
            entity_id: input_boolean.randomize_vacation_lights



