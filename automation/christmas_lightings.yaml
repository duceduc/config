#########################################################
#                                                                                                              #
#             Christmas Lightings                                                                        #
#                                                                                                              #
#########################################################

- alias: Enable Christmas Lights
  trigger:
  - platform: numeric_state
    entity_id: sensor.front_illuminance
    above: 0.35
  - platform: time
    at: '18:10:00'
  - platform: time
    at: '22:00:00'
  - platform: numeric_state
    entity_id: sensor.front_illuminance
    below: 0.16    
  condition:
  - condition: template # Vacation mode is off
    value_template: "{{ not is_state('input_boolean.vacation_mode', 'on') }}"
  - condition: template # Someone is home
    value_template: "{{ is_state('input_select.home_mode', 'Home') }}"

  action:
    choose:
      - conditions: "{{ states('sensor.front_illuminance')| float(0) <= 0.16 or now().hour == 22 and now().minute == 00 }}"
        sequence:
          - service: switch.turn_off
            data:
              entity_id: switch.christmas_lights
    
      - conditions: "{{ states('sensor.front_illuminance')| float(0) >= 0.35 and is_state('sensor.date_weekday', 'off') }}"
        sequence:
          - service: switch.turn_on
            data:
              entity_id: switch.christmas_lights

      - conditions: "{{ states('sensor.front_illuminance')| float(0) >= 0.50 and is_state('sensor.date_weekday', 'on') }}"
        sequence:
          - service: switch.turn_on
            data:
              entity_id: switch.christmas_lights



#########################################################
#                                                                                                              #
#             END OF CONFIGURATION FILE                                                          #
#                                                                                                              #
#########################################################