#########################################################
#                                                                                                              
#             Hallway Light                                                                                
#                                                                                                              
#########################################################

- alias: 'motion hallway auto-on'
  trigger:
    - platform: state
      entity_id: binary_sensor.motion_hallway_occupancy
      from: 'off'
      to: 'on'
  condition:
    - condition: template # Not on vacation
      value_template: "{{ not is_state('input_select.home_mode', 'Vacation') }}"
  action:
#    - service_template: script.hallway_light_guest_mode_{{ 'on' if is_state('input_boolean.guest_mode', 'on') else 'off' }}
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.guest_mode
              state: "on"
          sequence:
            - service: script.tradfri_transition
              data:
                entity_id: light.h_2
                color_temp: 400
                transition: 2
                brightness: 200
              entity_id: light.h_2        
        
        - conditions:        
            - condition: template
              value_template: '{{ now().hour > 19 or now().hour < 7 }}'
          sequence:
            - service: script.tradfri_transition
              data:
                entity_id: light.h_2
                color_temp: 400
                transition: 2
                brightness: 50
              entity_id: light.h_2      

      default:
        - service: script.tradfri_transition
          data:
            entity_id: light.h_2
            color_temp: 400
            transition: 2
            brightness: 200
          entity_id: light.h_2
  mode: restart


- alias: 'motion hallway auto-off'
  trigger:
    - platform: state
      entity_id: binary_sensor.motion_hallway_occupancy
      to: 'off'
      for: '00:01:00'
  action:  
    - service: light.turn_off
      data:
        entity_id: light.h_2


#########################################################
#                                                                                                              
#             Genkan Light & LR only at night                                                       
#                                                                                                              
#########################################################

- alias: 'motion genkan auto-on'
  trigger:
   - platform: state
     entity_id: binary_sensor.motion_g1_occupancy # motion_security_occupancy
     to: 'on'
  action:
#    - service: light.turn_on
#      entity_id: light.h_1
#      data:
#        brightness: 200
    - service: script.tradfri_transition
      data:
        entity_id: light.h_1
        color_temp: 400
        transition: 2
        brightness: 200
      entity_id: light.h_1




- alias: 'motion genkan auto-off'
  trigger:
  - platform: state
    entity_id: binary_sensor.motion_g1_occupancy # motion_security_occupancy
    to: 'off'
    for: '00:00:30'
  action:  
  - service: light.turn_off
    data:
      entity_id: light.h_1


#########################################################
#                                                                                                              
#             Turn on Genkan For Eri During Workdays                                            
#                                                                                                              
#########################################################

- alias: 'turn on genkan for eri'
  trigger:
    platform: time
    at: '05:25:00'
  condition:
  - condition: and
    conditions:
    - condition: template # Is weekday
      value_template: "{{ is_state('sensor.date_weekday', 'on') }}"
    - condition: template # Don't run if holiday
      value_template: "{{ states.sensor.holiday.state | trim == '' }}"

    - condition: state
      entity_id: binary_sensor.eri_presence
      state: 'on'
  action:
#  - service: light.turn_on
#    entity_id: light.h_1
#    data:
#      brightness: 200
    - service: script.tradfri_transition
      data:
        entity_id: light.h_1
        color_temp: 400
        transition: 2
        brightness: 200
      entity_id: light.h_1
      
      


#########################################################
#                                                                                                              
#             END OF CONFIGURATION FILE                                                          
#                                                                                                              
#########################################################