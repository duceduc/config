####################################################
#                                                                                                    #
#                    Link Signals                                                                #
#                                                                                                    #
####################################################

title: Signals
path: signals
icon: mdi:wifi
background: "center / cover no-repeat url('/local/img/wallpaper/midnight.jpg') fixed"
cards:
  - type: custom:bar-card
    title: Wifi Motion Signals
    show_header_toggle: false
    max: -100
    min: 0
    positions:
      icon: 'off'
      indicator: 'off'
      value: inside
    entities:
      - entity: sensor.aio_wemos_wifi_signal
        name: Aio Wemos        
      - entity: sensor.sr_sensor_wifi_signal
        name: Shion Room Sensors
      - entity: sensor.hallway_sensor_wifi_signal
        name: Hallway Sensors
      - entity: sensor.lr_sensor_wifi_signal
        name: Livingroom Sensors        
      - entity: sensor.washroom_sensor_wifi_signal
        name: Washroom Sensor
    severity:
      - color: var(--label-badge-green)
        from: -67
        to: ''
      - color: orange
        from: -80
        to: -67
      - color: var(--label-badge-red)
        from: -90
        to: -80
        
  - type: custom:bar-card
    title: Wifi Device Signals
    show_header_toggle: false
    max: -100
    min: 0
    positions:
      icon: 'off'
      indicator: 'off'
      value: inside
    entities:
      - entity: sensor.bed_sensor_wifi_signal
        name: Bed Sensor
      - entity: sensor.toilet_airfreshener_wifi_signal
        name: Toilet Air Freshner
      - entity: sensor.ikea_pm25_wifi_signal
        name: Ikea Air Sensor

    severity:
      - color: var(--label-badge-green)
        from: -67
        to: ''
      - color: orange
        from: -80
        to: -67
      - color: var(--label-badge-red)
        from: -90
        to: -80

  - type: custom:bar-card
    title: Wifi Server Signals
    show_header_toggle: false
    max: -100
    min: 0
    positions:
      icon: 'off'
      indicator: 'off'
      value: inside
    entities:
      - entity: sensor.esp32_linkquality
        name: SwitchbotMQTT
      - entity: sensor.ms1_wifi_strength
        name: MS1 Server
      - entity: sensor.ms2_wifi_strength
        name: MS2 Server
      - entity: sensor.ms3_wifi_strength
        name: MS3 Server

    severity:
      - color: var(--label-badge-green)
        from: -67
        to: ''
      - color: orange
        from: -80
        to: -67
      - color: var(--label-badge-red)
        from: -90
        to: -80

  - type: custom:bar-card
    title: Bluetooth SB Signals
    show_header_toggle: false
    max: -100
    min: 0
    positions:
      icon: 'off'
      indicator: 'off'
      value: inside
    entities:
      - entity: sensor.cr_curtain_lt_linkquality
        name: Curtain Computer Room Left
      - entity: sensor.cr_curtain_rt_linkquality
        name: Curtain Computer Room Right
      - entity: sensor.lr_curtain_lt_linkquality
        name: Curtain Living Room Left
      - entity: sensor.lr_curtain_rt_linkquality
        name: Curtain Living Room Right
      - entity: sensor.genkan_doorlock_linkquality
        name: Genkan Doorlock
      - entity: sensor.jcom_tv_box_linkquality
        name: Jcom Tv Box
      - entity: sensor.24hr_fan_linkquality
        name: 24hr Fan
      - entity: sensor.hdmi_selector_linkquality
        name: HDMI Selector
      - entity: sensor.meter_linkquality
        name: Genkan Thermometer
    severity:
      - color: var(--label-badge-green)
        from: -67
        to: ''
      - color: orange
        from: -80
        to: -67
      - color: var(--label-badge-red)
        from: -90
        to: -80



  - type: custom:bar-card
    title: Zigbee Dimmer Signals
    show_header_toggle: false
    max: 125
    min: 0
    positions:
      icon: 'off'
      indicator: 'off'
      value: inside
    entities:
      - entity: sensor.shower_room_linkquality
        name: Shower Room Dimmer
      - entity: sensor.cr_curtains_linkquality
        name: Computer Room Curtain Dimmer
      - entity: sensor.lr_curtains_linkquality
        name: Living Room Curtain Dimmer
      - entity: sensor.shion_dimmer_linkquality
        name: Shion Room Dimmer
      - entity: sensor.master_dimmer_linkquality
        name: Master Room Dimmer
      - entity: sensor.kitchen_dimmer_linkquality
        name: Kitchen Switch Dimmer        
      - entity: sensor.0x00124b001938c31b_linkquality
        name: CC2531 Router
    severity:
      - color: var(--label-badge-red)
        from: 0
        to: 25
      - color: orange
        from: 26
        to: 50
      - color: var(--label-badge-green)
        from: 51
        to: 125





  - type: custom:bar-card
    title: Zigbee Controller Signals
    show_header_toggle: false
    max: 125
    min: 0
    positions:
      icon: 'off'
      indicator: 'off'
