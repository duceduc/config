title: Climate
path: climate
icon: mdi:home-thermometer-outline
# background: "center / cover no-repeat url('/local/lovelace/wallpaper/midnight.jpg') fixed"
cards:

  - type: custom:decluttering-card
    template: temperature_tpl
    variables:
      - title: Outside
      - icon: weather-windy
      - entity_1: sensor.home_windspeed
      - name_1: Wind Speed
      - entity_2: sensor.oa_humidity
      - name_2: Outside Humidity
      - entity_3: sensor.oa_temperature 
      - name_3: Outside Temperature

  - type: custom:decluttering-card
    template: temperature_tpl
    variables:
      - title: Master Room
      - icon: weather-rainy
      - entity_1: sensor.mr_condensation_chance
      - name_1: Room Condensation
      - entity_2: sensor.mr_humidity
      - name_2: Room Humidity
      - entity_3: sensor.mr_temperature
      - name_3: Room Temperature



  #  - type: custom:decluttering-card
  #    template: temperature_tpl
  #    variables:
  #      - title: Hallway
  #      - icon: weather-rainy
  #      - entity_1: sensor.hallway_condensation_chance      
  #      - name_1: Hallway Condensation
  #      - entity_2: sensor.hr_sensor_humidity
  #      - name_2: Hallway Humidity
  #      - entity_3: sensor.hr_sensor_temperature
  #      - name_3: Hallway Temperature

  - type: custom:decluttering-card
    template: temperature_tpl
    variables:
      - title: Genkan
      - icon: weather-rainy
      - entity_1: sensor.genkan_condensation_chance
      - name_1: Genkan Condensation
      - entity_2: sensor.meter_humidity
      - name_2: Genkan Humidity
      - entity_3: sensor.meter_temperature
      - name_3: Genkan Temperature


  - type: custom:decluttering-card
    template: temperature_tpl
    variables:
      - title: MDF
      - icon: weather-rainy
      - entity_1: sensor.mdf_condensation_chance
      - name_1: MDF Condensation
      - entity_2: sensor.mdf_humidity
      - name_2: Shoe Closet Humidity
      - entity_3: sensor.mdf_temperature
      - name_3: Shoe Closet Temperature

  - type: custom:decluttering-card
    template: temperature_tpl
    variables:
      - title: Shion Room
      - icon: weather-rainy
      - entity_1: sensor.sr_condensation_chance
      - name_1: Room Condensation
      - entity_2: sensor.sr_humidity
      - name_2: Room Humidity
      - entity_3: sensor.sr_temperature
      - name_3: Room Temperature

  - type: custom:decluttering-card
    template: temperature_tpl
    variables:
      - title: Livingroom
      - icon: weather-rainy
      - entity_1: sensor.lr_condensation_chance 
      - name_1: Room Condensation
      - entity_2: sensor.livingroom_humidity
      - name_2: Room Humidity
      - entity_3: sensor.lr_radar_temperature
      - name_3: Room Temperature



  - type: custom:decluttering-card
    template: temperature_tpl
    variables:
      - title: Kitchen
      - icon: weather-rainy
      - entity_1: sensor.kitchen_condensation_chance 
      - name_1: Room Condensation
      - entity_2: sensor.espresense_kitchen_humidity
      - name_2: Room Humidity
      - entity_3: sensor.espresense_kitchen_temperature
      - name_3: Room Temperature

  - type: custom:decluttering-card
    template: temperature_tpl
    variables:
      - title: Computer Room
      - icon: weather-rainy
      - entity_1: sensor.computerroom_condensation_chance 
      - name_1: Room Condensation
      - entity_2: sensor.espresense_computerroom_humidity
      - name_2: Room Humidity
      - entity_3: sensor.espresense_computerroom_temperature
      - name_3: Room Temperature

  - type: custom:decluttering-card
    template: temperature_tpl
    variables:
      - title: Toilet Room
      - icon: weather-rainy
      - entity_1: sensor.toilet_condensation_chance 
      - name_1: Room Condensation
      - entity_2: sensor.toilet_airfreshener_humidity
      - name_2: Room Humidity
      - entity_3: sensor.toilet_airfreshener_temperature
      - name_3: Room Temperature

  # Hide when turned off
  - type: entities
    title: Humidifier
    show_header_toggle: false
    footer:
      type: graph
      entity: sensor.sb_humidifier_temperature
      detail: 2
    entities:
      - entity: sensor.sb_humidifier_nebulization_efficiency
        name: Humidifier Efficiency
        icon: mdi:molecule
      - entity: sensor.sb_humidifier_humidity
        name: Humidifier Humidity
        icon: mdi:water-percent
      - type: divider
      - entity: sensor.sb_humidifier_temperature
        name: Humidifier Temperature
        icon: mdi:thermometer-lines
    style: |
      ha-card {
        {% if is_state('switch.sb_humidifier','off') %}
           display:none !important;
        {% endif %}
      }












