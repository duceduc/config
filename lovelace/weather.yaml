####################################################

title: Weather
path: weather
panel: false
icon: mdi:weather-partly-snowy-rainy
background: "center / cover no-repeat url('/local/img/wallpaper/midnight.jpg') fixed"
cards:

  - type: alarm-panel
    entity: alarm_control_panel.home_alarm
    states: 
      - arm_away

  - type: weather-forecast
    name: Kawaguchi
    entity: weather.weatherbit
    secondary_info_attribute: humidity
  - type: entities
    entities:
      - sun.sun
      - entity: sensor.nextsunrise
        icon: mdi:weather-sunset-up
      - entity: sensor.nextsunset
        icon: mdi:weather-sunset-down
      - entity: sensor.hoursdaylight
        icon: mdi:clock
        name: Hours of Daylight
      - type: attribute
        entity: sun.sun
        attribute: elevation
        name: Sun Elevation
        icon: mdi:weather-sunset
        
#  - type: picture-entity
#    title: Cam
#    show_header_toggle: false
#    aspect_ratio: 16x9
