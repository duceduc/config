####################################################
#                                                                                                    #
#                      Switchbot Curtain Batteries Average                              #
#                                                                                                    #
####################################################

# Combined Average Battery
  - platform: template
    sensors:
      cr_curtain_batteries:
        friendly_name: "CR Curtain Batteries"
        unit_of_measurement: '%'
        device_class: battery
        value_template: "{{ ((states('sensor.cr_curtain_lt_battery')|int(0) + states('sensor.cr_curtain_rt_battery')|int(0)) /2)|int(0) }}"

# Combined Average Battery
  - platform: template
    sensors:
      lr_curtain_batteries:
        friendly_name: "LR Curtain Batteries"
        unit_of_measurement: '%'
        device_class: battery
        value_template: "{{ ((states('sensor.lr_curtain_lt_battery')|int(0) + states('sensor.lr_curtain_rt_battery')|int(0)) /2)|int(0) }}"

####################################################
#                                                                                                    #
#                      Switchbot Combined Front Curtains                               #
#                                                                                                    #
####################################################
#{% if is_state('cover.computer_room_curtains', 'open') %}
#{% elif is_state('cover.living_room_curtains', 'open') %}

  - platform: template
    sensors:
      fr_curtains:
        value_template: >-        
          {% if is_state('cover.cr_curtain_lt_curtain', 'open') %}
            open
          {% elif is_state('cover.lr_curtain_lt_curtain', 'open') %}
            open
          {% else %}
            closed
          {% endif %}

