####################################################
#                                                                                                    
#                      HOLIDAYS / BIRTHDAYS                                               
#                                                                                                    
####################################################

#https://www.home-assistant.io/integrations/sensor.command_line/

  - platform: command_line
    name: Holiday
    command: 'cat /config/www/data/days.json'
    value_template: >
      {% set today = now().month  ~ '/' ~ now().day  %}
      {% set holiday = value_json.MAJOR_JP.static[ today ] %}
      {% if holiday | trim == "" %}
        {% set today = now().month  ~ '/' ~ now().day ~ '/' ~ now().year %}
        {% set holiday = value_json.MAJOR_JP.dynamic[ today ] %}
      {% endif %}
      {{ holiday }}
    scan_interval: 14400

  - platform: command_line
    name: Holidaytomorrow
    command: 'cat /config/www/data/days.json'
    value_template: >
      {% set today = as_timestamp(now() + timedelta(days = 1))|timestamp_custom('%-m/%-d', true )  %}
      {% set holiday = value_json.MAJOR_JP.static[ today ] %}
      {% if holiday | trim == "" %}
        {% set today = as_timestamp(now() + timedelta(days = 1))|timestamp_custom('%-m/%-d', true ) ~ '/' ~ now().year  %}
        {% set holiday = value_json.MAJOR_JP.dynamic[ today ] %}
      {% endif %}
      {{ holiday }}
    scan_interval: 14400

  - platform: command_line
    name: Holidayinaweek
    command: 'cat /config/www/data/days.json'
    value_template: >
      {% set today = as_timestamp(now() + timedelta(days = 7))|timestamp_custom('%-m/%-d', true )  %}
      {% set holiday = value_json.MAJOR_JP.static[ today ] %}
      {% if holiday | trim == "" %}
        {% set today = as_timestamp(now() + timedelta(days = 7))|timestamp_custom('%-m/%-d', true ) ~ '/' ~ now().year  %}
        {% set holiday = value_json.MAJOR_JP.dynamic[ today ] %}
      {% endif %}
      {{ holiday }}
    scan_interval: 14400


####################################################
#                                                                                                    
#                      Anniversaries                                          
#                                                                                                    
####################################################


  - platform: command_line
    name: Anniversary
    command: 'cat /config/www/data/days.json'
    value_template: >
      {% set today = now().month  ~ '/' ~ now().day  %}
      {% set tomorrow = (as_timestamp(now())+86400*1)| timestamp_custom("%-m")~ '/' ~(as_timestamp(now())+86400*1)| timestamp_custom("%-d")%}
      {% set in_a_week = (as_timestamp(now())+86400*7)| timestamp_custom("%-m")~ '/' ~(as_timestamp(now())+86400*7)| timestamp_custom("%-d")%}
      
      {% set anniversary_today =  value_json.MAJOR_JP.anniversary[ today ] %}
      {% set anniversary_tomorrow =  value_json.MAJOR_JP.anniversary[ tomorrow ] %}
      {% set anniversary_in_a_week =  value_json.MAJOR_JP.anniversary[ in_a_week ] %}
      
      {% if anniversary_today | trim != "" %}
        {% set notification = "Today is " + anniversary_today %}
      {% endif %}
      
      {% if anniversary_tomorrow | trim != "" %}
        {% if notification | trim == "" %}
          {% set notification = "Tomorrow is " + anniversary_tomorrow %}
        {% else %}
          {% set notification = notification + " and tomorrow is " + anniversary_tomorrow %}
        {% endif %}
      {% endif %}
      
      {% if anniversary_in_a_week | trim != "" %}
        {% if notification | trim == "" %}
          {% set notification = "In a week is " + anniversary_in_a_week %}
        {% else %}
          {% set notification = notification + " and in a week is " + anniversary_in_a_week %}
        {% endif %}
      {% endif %}
      
      {{notification}}
    scan_interval: 14400


####################################################
#                                                                                                    
#                      Wolframalpha                                               
#                                                                                                    
####################################################

  - platform: rest
    name: Christmas Countdown
    resource: !secret wolframalpha_xmas_api
    value_template: "{{ (value|replace(' days', '')) | int }}"
    unit_of_measurement: Days
    scan_interval: 43200

  - platform: rest
    name: Halloween Countdown
    resource: !secret wolframalpha_halloween_api
    value_template: "{{ (value|replace(' days', '')) | int }}"
    unit_of_measurement: Days
    scan_interval: 43200

####################################################
#                                                                                                    
#            END OF CONFIGURATION FILE                                                 
#                                                                                                    
####################################################