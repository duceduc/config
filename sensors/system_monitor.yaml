####################################################
#                                                                                                    #
#                      SYSTEM MONITOR                                                      #
#                                                                                                    #
####################################################

  - platform: command_line
    name: HA CPU Temperature
    command: "cat /sys/class/thermal/thermal_zone0/temp"
    unit_of_measurement: "°C"
    value_template: '{{ value | multiply(0.001) | round(1) }}'

  - platform: sql
    db_url: !secret MySQL_login
    queries:
      - name: 'recorder_db'
        query: 'SELECT table_schema "database", Round(Sum(data_length + index_length) / 1024 / 1024, 1) "value" FROM information_schema.tables WHERE table_schema="jnzufwmy_hassio" GROUP BY table_schema;'
        column: 'value'
        unit_of_measurement: MB

  - platform: filesize
    file_paths:
      - /config/home-assistant_v2.db

# HA Servers
  - platform: systemmonitor
    resources:
      - type: memory_free
      - type: memory_use_percent
      - type: processor_use
      - type: last_boot
      - type: load_1m
      - type: load_5m
      - type: load_15m
      - type: disk_use_percent
        arg: /

  - platform: uptime
    name: Time Online


####################################################
#                                                                                                    #
#            END OF CONFIGURATION FILE                                                 #
#                                                                                                    #
####################################################
