#        column: 'value'
#        unit_of_measurement: GB

# HA Servers
  - platform: systemmonitor
    resources:
      - type: memory_free
      - type: memory_use_percent
      - type: processor_use
      - type: last_boot
      - type: load_1m
      - type: load_5m
      - type: load_15m
      - type: disk_use_percent
        arg: /

  - platform: uptime
    name: Time Online

# Converted to GB using HASS.Agent Integration
  - platform: template
    sensors:
      desktop_fddl8i4_storage_c_used_space_gb:
        value_template: >-
         {% if states('sensor.desktop_fddl8i4_storage_c_used_space')| int(0) < 1024 %}
           {{ states('sensor.desktop_fddl8i4_storage_c_used_space') }}
         {% else %}
           {{ '%.1f'|format(states('sensor.desktop_fddl8i4_storage_c_used_space')|float / 1024) }}
         {% endif %}
        unit_of_measurement: "GB"


