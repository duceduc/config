####################################################
#                                                                                                    #
#                      TIME                                                                       #
#                                                                                                    #
####################################################

  - platform: time_date
    display_options:
     - 'time'
     - 'date'
     - 'date_time'
     - 'time_utc'

  - platform: template
    sensors:
      period_of_the_day:
        friendly_name: 'Period of the day'
        value_template: >-
          {% set elevation = state_attr('sun.sun', 'elevation') %}
          {% set rising = state_attr('sun.sun', 'rising') %}
          {%- if elevation <= -7 -%}
            night
          {%- elif -7 < elevation <= -1 -%}
            {{ 'dawn' if rising else 'dusk' }}
          {%- else -%}
            day
          {%- endif -%}light
        icon_template: >-
          {% set elevation = state_attr('sun.sun', 'elevation') %}
          {% set rising = state_attr('sun.sun', 'rising') %}
          {%- if elevation <= -7 -%}
            mdi:weather-night
          {%- elif -7 < elevation <= -1 -%}
            mdi:weather-sunset-{{ 'up' if rising else 'down' }}
          {% else %}
            mdi:weather-sunny
          {% endif %}





  - platform: template
    sensors:
      disable_device_time:
        value_template: >-
          {% if is_state("sensor.date_weekday", "on") %}21:15:00{% else %}22:15:00{% endif %}




####################################################
#                                                                                                    #
#            END OF CONFIGURATION FILE                                                 #
#                                                                                                    #
####################################################