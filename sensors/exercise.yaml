####################################################
#                                                                                                    #
#                      EXERCISE                                                                 #
#                                                                                                    #
####################################################


# https://community.home-assistant.io/t/map-values-for-an-input-select/94354/5
  - platform: template
    sensors:
      exercise_map:
        value_template: >
          {% set mapper =
            { 'Master Room':'light.master_room',
              'Computer Room':'light.computer_room',
              'Shion Room':'light.shion_room',
              'Living Room':'light.living_room' } %}
          {% set state = states('input_select.exercise_select') %}
          {% set id = mapper[state] if state in mapper %}
          {{ id }}


####################################################
#                                                                                                    #
#            END OF CONFIGURATION FILE                                                 #
#                                                                                                    #
####################################################