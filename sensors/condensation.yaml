# LR Mold Chance
  - platform: mold_indicator
    name: Lr Condensation Chance
    indoor_temp_sensor: sensor.lr_temperature
    indoor_humidity_sensor: sensor.livingroom_humidity
    outdoor_temp_sensor: sensor.oa_temperature
    calibration_factor: 1.4

# MR Mold Chance
  - platform: mold_indicator
    name: Mr Condensation Chance
    indoor_temp_sensor: sensor.mr_temperature
    indoor_humidity_sensor: sensor.mr_humidity
    outdoor_temp_sensor: sensor.oa_temperature
    calibration_factor: 2.4
    
# SR Mold Chance
  - platform: mold_indicator
    name: Sr Condensation Chance
    indoor_temp_sensor: sensor.sr_temperature
    indoor_humidity_sensor: sensor.sr_humidity
    outdoor_temp_sensor: sensor.oa_temperature
    calibration_factor: 1.4

# MDF Mold Chance
  - platform: mold_indicator
    name: MDF Condensation Chance
    indoor_temp_sensor: sensor.mdf_temperature
    indoor_humidity_sensor: sensor.mdf_humidity
    outdoor_temp_sensor: sensor.oa_temperature
    calibration_factor: 2.8

# Genkan Mold Chance
  - platform: mold_indicator
    name: Genkan Condensation Chance
    indoor_temp_sensor: sensor.meter_temperature
    indoor_humidity_sensor: sensor.meter_humidity
    outdoor_temp_sensor: sensor.oa_temperature
    calibration_factor: 1.1



