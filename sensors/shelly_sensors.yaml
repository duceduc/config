####################################################
#                                                                                                    #
#                      SHELLY DOOR SENSORS                                               #
#                                                                                                    #
####################################################
# genkan door sensor [D8BFC01A8C6A] - 192.168.1.82 [batt installed on 6/5/2021]
# hallway door sensor [D8BFC01A8C33] - 192.168.1.83
# shion door sensor [483FDA81F69D] - 192.168.1.92
# master door sensor [483FDA81F97F] - 192.168.1.93
# shellyem sensor [8CAAB506209A] - 192.168.1.87
# smart plug sensor [FCF5C4AAF6E1] - 192.168.1.91

# Doors
  - platform: template
    sensors:
      genkan_door:
        value_template: >-
         {% if is_state("binary_sensor.genkan_door", "off") %}Close{% else %}Open{% endif %}
        icon_template: >-
         {% if is_state("binary_sensor.genkan_door", "off") %}mdi:door-closed{% else %}mdi:door-open{% endif %}
      hallway_door:
        value_template: >-
         {% if is_state("binary_sensor.hallway_door", "off") %}Close{% else %}Open{% endif %}
        icon_template: >-
         {% if is_state("binary_sensor.hallway_door", "off") %}mdi:door-closed{% else %}mdi:door-open{% endif %}
      master_door:
        value_template: >-
         {% if is_state("binary_sensor.master_door", "off") %}Close{% else %}Open{% endif %}
        icon_template: >-
         {% if is_state("binary_sensor.master_door", "off") %}mdi:door-closed{% else %}mdi:door-open{% endif %}
      shion_door:
        value_template: >-
         {% if is_state("binary_sensor.shion_door", "off") %}Close{% else %}Open{% endif %}
        icon_template: >-
         {% if is_state("binary_sensor.shion_door", "off") %}mdi:door-closed{% else %}mdi:door-open{% endif %}

# Battery
  - platform: mqtt
    name: "Genkan Door Battery"
    state_topic: "shellies/D8BFC01A8C6A/sensor/battery"
    value_template: '{{ value|round(0) }}'
    qos: 0
    unit_of_measurement: "%"
    icon: mdi:battery

  - platform: mqtt
    name: "Hallway Door Battery"
    state_topic: "shellies/D8BFC01A8C33/sensor/battery"
    value_template: '{{ value|round(0) }}'
    qos: 0
    unit_of_measurement: "%"
    icon: mdi:battery

  - platform: mqtt
    name: "Master Door Battery"
    state_topic: "shellies/483FDA81F97F/sensor/battery"
    value_template: '{{ value|round(0) }}'
    qos: 0
    unit_of_measurement: "%"
    icon: mdi:battery

  - platform: mqtt
    name: "Shion Door Battery"
    state_topic: "shellies/483FDA81F69D/sensor/battery"
    value_template: '{{ value|round(0) }}'
    qos: 0
    unit_of_measurement: "%"
    icon: mdi:battery

# Temperature
  - platform: mqtt
    name: "Genkan Door Temperature"
    state_topic: "shellies/D8BFC01A8C6A/sensor/temperature"
    value_template: '{{ value|round(1) }}'
    qos: 1
    unit_of_measurement: "C"
    icon: mdi:thermometer

  - platform: mqtt
    name: "Hallway Door Temperature"
    state_topic: "shellies/D8BFC01A8C33/sensor/temperature"
    value_template: '{{ value|round(1) }}'
    qos: 1
    unit_of_measurement: "C"
    icon: mdi:thermometer

  - platform: mqtt
    name: "Master Door Temperature"
    state_topic: "shellies/483FDA81F97F/sensor/temperature"
    value_template: '{{ value|round(1) }}'
    qos: 1
    unit_of_measurement: "C"
    icon: mdi:thermometer

  - platform: mqtt
    name: "Shion Door Temperature"
    state_topic: "shellies/483FDA81F69D/sensor/temperature"
    value_template: '{{ value|round(1) }}'
    qos: 1
    unit_of_measurement: "C"
    icon: mdi:thermometer


####################################################
#                                                                                                    #
#            END OF CONFIGURATION FILE                                                 #
#                                                                                                    #
####################################################