####################################################
#                                                                                                    #
#                      WIFI Signal                                                                                     #
#                                                                                                    #
####################################################

  - platform: mqtt
    name: 'Washroom Sensor Wifi Signal'
    state_topic: "esphome/washroom-sensor/sensor/washroom-sensor_wifi_signal/state"
    value_template: '{{ value }}'
    unit_of_measurement: 'dBm'
    icon: mdi:signal

  - platform: mqtt
    name: 'Hallway Sensor Wifi Signal'
    state_topic: "esphome/hallway-sensor/sensor/hallway-sensor_wifi_signal/state"
    value_template: '{{ value }}'
    unit_of_measurement: 'dBm'
    icon: mdi:signal


