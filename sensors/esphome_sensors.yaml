####################################################
#                                                                                                    #
#                      Illuminance                                                                #
#                                                                                                    #
####################################################


  - platform: mqtt
    name: 'Hallway Illuminance'
    state_topic: "esphome/hallway-sensor/sensor/hallway-sensor_illuminance/state"
    value_template: '{{ value }}'
    unit_of_measurement: 'lux'
    icon: mdi:gamma




