####################################################
#                                                                                                    #
#                      TEMPERATURE                                                           #
#                                                                                                    #
####################################################

# Shoe Closet. DHT Integration
  - platform: dht
    sensor: DHT22
    pin: D4
    name: mdf
    scan_interval: 60
    monitored_conditions:
     - temperature
     - humidity

####################################################
#                                                                                                    #
#                      Desktop CPU Temperature                                            #
#                                                                                                    #
####################################################

  - platform: mqtt
    name: "Desktop CPU Temperature"
    state_topic: "iotlink/workgroup/desktop-fddl8i4/windows-monitor/stats/temperatures/intelcpu-0-temperature-4"
    value_template: '{{ value|round(0) }}'
    qos: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer


####################################################
#                                                                                                    #
#                      Feels Like Temperature                                               #
#                                                                                                    #
####################################################

  - platform: template
    sensors:
      oa_feels_like:
        friendly_name: 'Outside Feels Like'
        unit_of_measurement: "°C"
        value_template: >
          {% set temp = states('sensor.oa_temperature')|float(0) %}
          {% set humidity = states('sensor.oa_humidity')|float(0) %}
          {{(0.567 * temp + 0.393 * (humidity/ 100 * 6.105 * e ** (17.27 * temp / (237.7 + temp ) )) + 3.94) | round(1) }}

####################################################
#                                                                                                    #
#            END OF CONFIGURATION FILE                                                 #
#                                                                                                    #
####################################################