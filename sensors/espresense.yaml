# Duc
  - platform: mqtt_room
    name: 'Duc ESPresense'
    device_id: 'apple:iphone10-3'
    state_topic: 'espresense/devices/apple:iphone10-3'
    timeout: 30
    away_timeout: 120

  - platform: mqtt_room
    name: 'Duc iWatch ESPresense'
    device_id: 'apple:watch3-3'
    state_topic: 'espresense/devices/apple:watch3-3'
    timeout: 30
    away_timeout: 120

