#########################################################
#                                                                                                              #
#            SHELLY DOOR SENSORS                                                                  #
#                                                                                                              #
#########################################################


# Shelly Genkan Door
  - platform: mqtt
    state_topic: "shellies/D8BFC01A8C6A/sensor/state"
    name: "Genkan Door"
    payload_on: 'open'
    payload_off: 'close'
    device_class: lock
    qos: 0

# Shelly Hallway Door
  - platform: mqtt
    state_topic: "shellies/D8BFC01A8C33/sensor/state"
    name: "Hallway Door"
    payload_on: 'open'
    payload_off: 'close'
    device_class: lock
    qos: 0

# Shelly Master Door
  - platform: mqtt
    state_topic: "shellies/483FDA81F97F/sensor/state"
