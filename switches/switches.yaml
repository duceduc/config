####################################################
#                                                                                                    #
#                    Momentary Switches                                                    #
#                                                                                                    #
####################################################

  - platform: momentary
    name: Activate Guest
    mode: on
    toggle_for: 10
    cancellable: True

  - platform: momentary
    name: Activate Tv
    mode: on
    toggle_for: 10
    cancellable: True

####################################################
#                                                                                                    #
#                    Customize Switches                                                     #
#                                                                                                    #
####################################################

# Christmas Light Switch
  - platform: template
    switches:
     christmas_lights:
       friendly_name: 'Christmas Lights'
       value_template: "{{ states('input_boolean.christmas_lights') }}"
       turn_on:
         - service: switch.turn_on
           entity_id: group.christmas_lights
         - service: input_boolean.turn_on
           entity_id: input_boolean.christmas_lights
       turn_off:
         - service: switch.turn_off
           entity_id: group.christmas_lights
         - service: input_boolean.turn_off
           entity_id: input_boolean.christmas_lights
       icon_template: >-
         {% if is_state('input_boolean.christmas_lights', 'on') %}
            mdi:string-lights
         {% else %}
            mdi:string-lights-off
         {% endif %}

# Desktop Switch
  - platform: template
    switches:
     desktop:
       friendly_name: 'Desktop'
       value_template: "{{ states('binary_sensor.desktop_connected') }}"
       turn_on:
         - service: script.desktop_wol
       turn_off:
         - service: script.desktop_shutdown
       icon_template: >-
         {% if is_state('binary_sensor.desktop_connected', 'on') %}
            mdi:desktop-mac-dashboard
         {% else %}
            mdi:desktop-mac
         {% endif %}



####################################################
#                                                                                                    #
#          END OF CONFIGURATION FILE                                                   #
#                                                                                                    #
####################################################