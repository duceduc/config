####################################################
#                                                                                                    #
#                    Convert to Switch                                                        #
#                                                                                                    #
####################################################


  - platform: template
    switches:
     ceiling_fan_lights:
       friendly_name: 'Ceiling Fan Lights'
       value_template: "{{ states('input_boolean.ceiling_fan_lights') }}"
       turn_on:
         - service: switch.turn_on
           data: 
             entity_id: switch.ceiling_fan_light
         - service: input_boolean.turn_on
           entity_id: input_boolean.ceiling_fan_lights
       turn_off:
         - service: switch.turn_off
           data: 
             entity_id: switch.ceiling_fan_light
         - service: input_boolean.turn_off
           entity_id: input_boolean.ceiling_fan_lights
       icon_template: >-
         {% if is_state('input_boolean.ceiling_fan_lights', 'on') %}
            mdi:lightbulb-on
         {% else %}
            mdi:lightbulb
         {% endif %}


