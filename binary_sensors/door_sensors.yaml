#########################################################

# Shelly Genkan Door
  - platform: mqtt
    state_topic: "shellies/D8BFC01A8C6A/sensor/state"
    name: "Genkan Door"
    payload_on: 'open'
    payload_off: 'close'
    device_class: lock
    qos: 0

