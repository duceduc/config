#########################################################
#                                                                                                              #
#            Shion at school                                                                             #
#                                                                                                              #
#########################################################

  - platform: bayesian
    prior: 0.6
    name: Shion at School Baysn
    probability_threshold: 0.92
    observations:
      - platform: template
        value_template: "{{ states('sensor.period_of_the_day').lower() in ['daylight', 'dusklight'] }}"
        prob_given_true: 0.8
        prob_given_false: 0.3

      - platform: state
        entity_id: sensor.date_weekend
        to_state: 'weekday'
        prob_given_true: 0.8
        prob_given_false: 0.3

      - platform: state
        entity_id: calendar.holidays_in_japan
        to_state: 'off' 
        prob_given_true: 0.8
        prob_given_false: 0.3

      - platform: template
        value_template: "{{ states('sensor.school_event').lower() in ['shion school day'] }}"
        prob_given_true: 0.9
        prob_given_false: 0.3


#########################################################
#                                                                                                              #
#             END OF CONFIGURATION FILE                                                          #
#                                                                                                              #
#########################################################