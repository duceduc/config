#########################################################
#                                                                                                              #
#            Shion at school                                                                             #
#                                                                                                              #
#########################################################

  - platform: bayesian
    prior: 0.6
    name: Shion at School Baysn
    probability_threshold: 0.92
 #   device_class: presence
    observations:
      - platform: 'template'
        value_template: "{{ 'daylight' in states('sensor.period_of_the_day').lower() }}"
        prob_given_true: 0.8
        prob_given_false: 0.3

      - platform: 'state'
        entity_id: 'sensor.date_weekend'
        to_state: 'weekday'        
        prob_given_true: 0.8
        prob_given_false: 0.3

      - platform: 'template'
        value_template: "{{ is_state('sensor.holiday', '') or states('sensor.holiday').lower() in ['eri birthday', 'duc birthday', 'sachiko'] }}"
        prob_given_true: 0.8
        prob_given_false: 0.3

      - platform: 'template'
        value_template: "{{ states('sensor.holiday').lower() in ['shion school day'] }}"
        prob_given_true: 0.9
        prob_given_false: 0.3



#########################################################
