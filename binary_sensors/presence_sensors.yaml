# GEO Location Detection
  - platform: template
    sensors:
      duc_home:
        friendly_name: 'Duc'
        device_class: presence
        value_template: >-
          {{ is_state('input_boolean.duc_home', 'on') }}
        icon_template: >-
          {% if is_state('binary_sensor.duc_home','on') %} mdi:home-account
          {% else %} mdi:home-outline
          {% endif %}

#  - platform: template
#    sensors:
      eri_home:
        friendly_name: 'Eri'
        device_class: presence
        value_template: >- 
          {{ is_state('input_boolean.eri_home', 'on') }}
        icon_template: >-
