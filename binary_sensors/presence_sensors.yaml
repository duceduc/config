# Local BLE Detection [Guest]
  - platform: template
    sensors:
      sachiko_presence:
        device_class: presence
        friendly_name: 'Sachiko'
        value_template: >-
          {{ is_state('input_boolean.sachiko_presence', 'on') }}
        icon_template: >-
          {% if is_state('binary_sensor.sachiko_presence','on') %} mdi:home-account
          {% else %} mdi:home-outline
          {% endif %}













  - platform: bayesian
    prior: 0.6
    name: Shion Presence Bayn
    probability_threshold: 0.92
 #   device_class: presence
    observations:
    - entity_id: 'input_boolean.shion_presence'
      prob_given_true: 0.8
      prob_given_false: 0.3
      platform: 'state'
      to_state: 'on'
    - entity_id: 'sensor.date_weekend'
      prob_given_true: 0.3
      prob_given_false: 0.8
      platform: 'state'
      to_state: 'weekend'

    - value_template: "{{ is_state('sensor.holiday', '') or 'duc' not in states.sensor.holiday.state.lower() }}"
      prob_given_true: 0.8
      prob_given_false: 0.3
      platform: 'template'

    - value_template: "{{ 'shion' not in states.sensor.holiday.state.lower() or 'eri' not in states.sensor.holiday.state.lower() }}"
      prob_given_true: 0.8
      prob_given_false: 0.3
      platform: 'template'












