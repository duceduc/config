#########################################################
#                                                                                                              #
#            Miscs                                                                                           #
#                                                                                                              #
#########################################################

  - platform: mqtt
    name: "Desktop - Connected"
    state_topic: "iotlink/workgroup/desktop-fddl8i4/lwt"
    value_template: "{{ value }}"
    payload_on: "ON"
    payload_off: "OFF"
    device_class: "connectivity"
    qos: 1

  - platform: threshold
    name: Devices with low battery
    entity_id: sensor.devices_with_low_battery
    upper: 0.5

  - platform: threshold
    name: ms2 updates
    entity_id: sensor.ms2_updates
    upper: 0.5


####################################################
#                                                                                                    #
#            Motion Sensors                                                                    #
#                                                                                                    #
####################################################

  - platform: template
    sensors:
      motion_sr_auto_on:
        value_template: >
          {% set w = states('sensor.date_weekday') %}
          {% set h = states('sensor.holiday')| trim !='' %}
          {% set end = '20:00:00' %}
          {% if w == 'on' or h == 'false' %} 
            {{ '07:00:00' < states('sensor.time') < end }}
          {% else %}
            {{ '09:30:00' < states('sensor.time') < end }}
          {% endif %}


####################################################
#                                                                                                    #
#            Internet Online/Offline                                                           #
#                                                                                                    #
####################################################

  - platform: ping
    name: Internet
    host: 8.8.8.8
    scan_interval: 15

#########################################################
#                                                                                                              #
#             END OF CONFIGURATION FILE                                                          #
#                                                                                                              #
#########################################################