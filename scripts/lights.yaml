#########################################################
#                                                                                                              #
#             Return to Normal                                                                           #
#                                                                                                              #
#########################################################

  normallight:
    sequence:
      - service: light.turn_on
        entity_id: light.ntl_1
        data:
          brightness: 254
          kelvin: 5000

  returntonormal:
    sequence:
      - service: script.normallight
      - delay: '00:00:01'
      - service: light.turn_off
        entity_id: light.ntl_1

