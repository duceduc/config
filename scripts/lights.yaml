#########################################################
#                                                                                                              #
#             Lights On Upon Arrival after Sunset                                                  #
#                                                                                                              #
#########################################################


  turn_on_lr_lights:
    alias: Turn on LR lights
    sequence:
      - service: light.turn_on
        data:
          entity_id: light.living_room
#      - service: switch.turn_on
#        data:
#          entity_id: group.christmas_lights

      - condition: template # Duc is home
        value_template: "{{ is_state('binary_sensor.duc_presence', 'on') }}"
      - service: script.desktop_wol
#      - wait_template: "{{ is_state('binary_sensor.desktop_connected', 'on') }}"
#        timeout: 60
#        continue_on_timeout: false
      - condition: template # pc not on yet
        value_template: "{{ is_state('binary_sensor.desktop_connected', 'off') }}"
      - service: switch.turn_on
        data:
          entity_id: switch.jcom_tv
      - delay: 10
      - service: script.tv_volume_down


#########################################################
#                                                                                                              #
#             Hallway Light Enable                                                                      #
#                                                                                                              #
#########################################################

  hallway_light_enable:
    alias: Hallway Light Enable
    sequence:
      - service: light.turn_on
        data_template:
          entity_id: light.h_2
          brightness: '{% if now().hour > 19 or now().hour < 7 %} 50 {% else %} 200 {% endif %}'

  hallway_light_enable_guest:
    alias: Hallway Light Enable guest
    sequence:
      - service: light.turn_on
        data_template:
          entity_id: light.h_2
          brightness: 200

#########################################################
#                                                                                                              #
#             Shion Room Alarm Lights                                                                 #
#                                                                                                              #
#########################################################

  wakeup_bedroom:
    alias: 'Wakeup lighting, smooth transition'
    sequence:
      - service: light.turn_on
        data_template:
          entity_id: '{{ states("sensor.wakeup_map") }}'
          brightness: 1
          kelvin: 1000
      - delay:
          seconds: 1
      - service: light.turn_on
        data_template:
          entity_id: '{{ states("sensor.wakeup_map") }}'
          brightness: 64
          kelvin: 2000
          transition: '{{ (( states.input_number.wakeup_duration.state | float * 60 / 4 )| round ) | int }}'
      - delay: '00:00:{{ (( states.input_number.wakeup_duration.state | float * 60 / 4 )| round ) | int }}'
      - service: light.turn_on
        data_template:
          entity_id: '{{ states("sensor.wakeup_map") }}'
          brightness: 128
          kelvin: 3000
          transition: '{{ (( states.input_number.wakeup_duration.state | float * 60 / 4 )| round ) | int }}'
      - delay: '00:00:{{ (( states.input_number.wakeup_duration.state | float * 60 / 4 )| round ) | int }}'
      - service: light.turn_on
        data_template:
          entity_id: '{{ states("sensor.wakeup_map") }}'
          brightness: 191
          kelvin: 4000
          transition: '{{ (( states.input_number.wakeup_duration.state | float * 60 / 4 )| round ) | int }}'
      - delay: '00:00:{{ (( states.input_number.wakeup_duration.state | float * 60 / 4 )| round ) | int }}'
      - service: light.turn_on
        data_template:
          entity_id: '{{ states("sensor.wakeup_map") }}'
          brightness: 254
          kelvin: 5000
          transition: '{{ (( states.input_number.wakeup_duration.state | float * 60 / 4 )| round ) | int }}'

#########################################################
#                                                                                                              #
#             Excercise Light Flash                                                                      #
#                                                                                                              #
#########################################################

  light_flash:
    alias: Light flash on
    sequence:
      - service: light.turn_on
        data:
          entity_id: '{{ states("sensor.exercise_map") }}'
      - delay:
          # time for flash light on
          seconds: 32
      - service: light.turn_off
        data:
          entity_id: '{{ states("sensor.exercise_map") }}'
      - service: script.turn_on
        data:
          entity_id: script.light_loop
  light_loop:
    alias: Light flash loop
    sequence:
      - delay:
          # time for flash light off
          seconds: 1
      - service: script.turn_on
        data:
          entity_id: script.light_flash

#########################################################
#                                                                                                              #
#             Dining Room Lights Toggle                                                               #
#                                                                                                              #
#########################################################


  dining_lights_toggle:
    sequence:
      - service: script.dining_lights_mode
        data:
          entity: remote.rm4_remote
          device: Ceiling Fan

  dining_lights_mode:
    sequence:
      - service_template: >
           script.dining_lights_mode_{{ 'off' if is_state('counter.dining_lights_toggle', '3' ) else 'on' }}           
        data_template:
          entity: '{{ entity }}'
          device: '{{ device }}'

  dining_lights_mode_on:
    sequence:
      - service: remote.send_command
        data:
          entity_id: '{{ entity }}'
          device: '{{ device }}'
          command: toggle lights
      - service: input_boolean.turn_on
        data:
          entity_id: input_boolean.ceiling_fan_lights
      - service: counter.increment
        target:
          entity_id: counter.dining_lights_toggle

  dining_lights_mode_off:
    sequence:
      - service: remote.send_command
        data:
          entity_id: '{{ entity }}'
          device: '{{ device }}'
          command: turn off lights
      - service: input_boolean.turn_off
        data:
          entity_id: input_boolean.ceiling_fan_lights
      - service: counter.reset
        target:
          entity_id: counter.dining_lights_toggle


