#########################################################
#                                                                                                              #
#             Return to Normal                                                                           #
#                                                                                                              #
#########################################################

  returntonormal:
    sequence:
      - service: script.normallight
        data:
          entity: '{{ entity }}'
      - delay: 1
      - service: light.turn_off
        data:
          entity_id: '{{ entity }}'

  normallight:
    sequence:
      - service: light.turn_on
        data:
          entity_id: '{{ entity }}'
          rgb_color: [255,222,8]
#          color_name: white
          brightness: 254

