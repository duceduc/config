#########################################################
#                                                                                                              #
#             IOT Desktop                                                                                 #
#                                                                                                              #
#########################################################


  desktop_wol:
    alias: "Desktop WOL"
    sequence:
      - service: wake_on_lan.send_magic_packet
        data:
          mac: "B4:4B:D6:27:22:55"
      - service: input_boolean.turn_on
        data:
          entity_id: input_boolean.desktop

  desktop_shutdown:
    alias: "Desktop - Shutdown"
    sequence:
      - service: mqtt.publish
        data:
          topic: "iotlink/workgroup/desktop-fddl8i4/commands/shutdown"
          payload: ""
      - service: input_boolean.turn_off
        data:
          entity_id: input_boolean.desktop

  desktop_hibernate:
    alias: "Desktop Hibernate"
    sequence:
      - service: mqtt.publish
        data:
          topic: "iotlink/workgroup/desktop-fddl8i4/commands/hibernate"
          payload: ""

  desktop_shion_class:
    alias: "Desktop Shion Class"
    sequence:
      - service: mqtt.publish
        data:
          topic: "iotlink/workgroup/desktop-fddl8i4/commands/run"
          payload: '{ "command": "C:\\Program Files (x86)\\Google\\Chrome\\Application\\chrome.exe", "args": "https://scratch.mit.edu", "path": "C:\\Program Files (x86)\\Google\\Chrome\\Application", "user": "", "visible": true, "fallback": true }'
      - service: mqtt.publish
        data:
          topic: "iotlink/workgroup/desktop-fddl8i4/commands/run"
          payload: '{ "command": "C:\\Users\\Duc\\AppData\\Roaming\\Zoom\\bin\\Zoom.exe", "path": "C:\\Users\\Duc\\AppData\\Roaming\\Zoom\\bin\\", "user": "", "visible": true, "fallback": true }'


