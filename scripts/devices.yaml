#########################################################
#                                                                                                              #
#             Ceiling Fan                                                                                   #
#                                                                                                              #
#########################################################

# Broadlink Cmd -> Emulated Hue
  turn_on_all_fans:
    sequence:
      - service: remote.send_command
        data:
          entity_id: remote.rm4_remote
          device: Yuasa Fan
          command:
          - power
      - service: remote.send_command
        data:
          entity_id: remote.rm4_remote
          device: Ceiling Fan
          num_repeats: 2
          command:
          - toggle summer fan

  turn_off_all_fans:
    sequence:
      - service: remote.send_command
        data:
          entity_id: remote.rm4_remote
          device: Yuasa Fan
          command:
          - power
      - service: remote.send_command
        data:
          entity_id: remote.rm4_remote
          device: Ceiling Fan
          command:
          - turn off fan

  toggle_winter_fan:
    sequence:
      - service: remote.send_command
        data:
          entity_id: remote.rm4_remote
          device: Ceiling Fan
          command:
          - toggle winter fan

  ceiling_fan_lights:
    sequence:
      - service: remote.send_command
        data:
          entity_id: remote.rm4_remote
          device: Ceiling Fan
          command:
          - lights

#########################################################
#                                                                                                              #
#             Turn Off Devices If Left On: No One Home                                          #
#                                                                                                              #
#########################################################

  dev_check:
    sequence:
      - service: script.dev_check_1
        data_template:
          room: 'lr'

  dev_check_1:
    sequence:
      - service: script.dev_check_2
        data_template:
          room: 'mr'
      - condition: template
        value_template: '{{ states("input_select.{{ room }}_ac_mode") != "Off" }}'
      - service: input_select.select_option
        data:
          entity_id: input_select.{{ room }}_ac_mode
          option: 'Off'

  dev_check_2:
    sequence:
      - service: script.dev_check_3
        data_template:
          room: 'sr'
      - condition: template
        value_template: '{{ states("input_select.{{ room }}_ac_mode") != "Off" }}'
      - service: input_select.select_option
        data:
          entity_id: input_select.{{ room }}_ac_mode
          option: 'Off'

  dev_check_3:
    sequence:
      - service: script.dev_check_4
      - condition: template
        value_template: '{{ states("input_select.{{ room }}_ac_mode") != "Off" }}'
      - service: input_select.select_option
        data:
          entity_id: input_select.{{ room }}_ac_mode
          option: 'Off'

  dev_check_4:
    sequence:
#      - service: script.dev_check_5
      - condition: template
        value_template: '{{ states("sensor.front_illuminance")| float >= 0.20 }}'
      - service: light.turn_off
        data:
          entity_id: light.computer_room, light.living_room
      - service: script.turn_off
        data_template:
          entity_id:  script.lr_lights_fadein_{{ 'day' if now().hour > 7 and now().hour < 16 else 'night' }}, script.cr_lights_fadein_{{ 'day' if now().hour > 7 and now().hour < 16 else 'night' }}

  dev_check_5:
    sequence:
      - condition: template
        value_template: '{{ states("group.christmas_lights") != "off" }}'
      - service: switch.turn_off
        data:
          entity_id: group.christmas_lights

#########################################################
#                                                                                                              #
#             Enable Devices at midnight                                                             #
#                                                                                                              #
#########################################################

  enable_devices:
    sequence:
      - service: script.enable_dev1

  enable_dev1:
    sequence:
      - service: script.enable_dev2
      - condition: template
        value_template: "{{ is_state('switch.tv_lock', 'on') }}"
      - service: homeassistant.turn_off
        data:
          entity_id: switch.tv_lock, input_boolean.child_mode

  enable_dev2:
    sequence:
      - condition: template
        value_template: "{{ is_state('switch.is_internet', 'on') or is_state('switch.isp_internet', 'on') }}"
      - service: switch.turn_off
        data:
          entity_id: switch.is_internet, switch.isp_internet

