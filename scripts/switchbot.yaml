#########################################################
#                                                                                                              #
#             Front Room Combined Curtains                                                         #
#                                                                                                              #
#########################################################


  fr_curtains:
    sequence:
      - service: "cover.{{ modus }}_cover"
        target:
          entity_id:
          - cover.living_room_curtains
          - cover.computer_room_curtains

  fr_curtains_position:
    sequence:
      - service: cover.set_cover_position
        target:
          entity_id:
          - cover.living_room_curtains
          - cover.computer_room_curtains
        data:
          position: "{{ position }}"


#########################################################
#                                                                                                              #
#             Livingroom Curtain Toggle Switches                                                  #
#                                                                                                              #
#########################################################

  lr_curtain_toggle:
    sequence:
      - service: script.lr_curtain_toggle_active
        data:
          entity: switch.living_room_curtains
# MQTT
#          entity: switch.living_room_curtain

  lr_curtain_toggle_active:
    sequence:
      - service_template: >
             script.lr_curtain_toggle_active_{{ 'on' if is_state('cover.living_room_curtains', 'closed') else 'off' }}           
        data_template:
          entity: '{{ entity }}'

  lr_curtain_toggle_active_on:
    sequence:
      - repeat:
          until:
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ is_state('sensor.switchbot_status', 'ok') }}"
                - condition: template
                  value_template: "{{ repeat.index % 5 == 0 }}"
          sequence:
            - service: switch.turn_on
              data:
                entity_id: '{{ entity }}'

  lr_curtain_toggle_active_off:
    sequence:
      - repeat:
          until:
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ is_state('sensor.switchbot_status', 'ok') }}"
                - condition: template
                  value_template: "{{ repeat.index % 5 == 0 }}"
          sequence:
            - service: switch.turn_off
              data:
                entity_id: '{{ entity }}'

#########################################################
#                                                                                                              #
#             Computer Room Curtain Toggle Switches                                           #
#                                                                                                              #
#########################################################

  cr_curtain_toggle:
    sequence:
      - service: script.cr_curtain_toggle_mode
        data:
          entity: switch.computer_room_curtains
# MQTT
#          entity: cover.computer_room_curtain


  cr_curtain_toggle_mode:
    sequence:
      - service_template: >
             script.cr_curtain_toggle_mode_{{ 'on' if is_state('cover.computer_room_curtains', 'closed') else 'off' }}           
        data_template:
          entity: '{{ entity }}'

  cr_curtain_toggle_mode_on:
    sequence:
      - repeat:
          until:
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ is_state('sensor.switchbot_status', 'ok') }}"
                - condition: template
                  value_template: "{{ repeat.index % 5 == 0 }}"
          sequence:
            - service: homeassistant.turn_on
              data:
                entity_id: '{{ entity }}'

  cr_curtain_toggle_mode_off:
    sequence:
      - repeat:
          until:
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ is_state('sensor.switchbot_status', 'ok') }}"
                - condition: template
                  value_template: "{{ repeat.index % 5 == 0 }}"
          sequence:
            - service: homeassistant.turn_off
              data:
                entity_id: '{{ entity }}'



