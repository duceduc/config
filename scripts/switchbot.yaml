#########################################################
#                                                                                                              #
#             Bot Device TPL                                                                             #
#                                                                                                              #
#########################################################

##### node.js switchbot bot tpl
  enable_bot_tpl:
    sequence:
      - repeat:
          until:
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ repeat.index % 10 == 0 }}"
                - condition: template
                  value_template: "{{ is_state('sensor.switchbot_status', 'ok') }}"
          sequence:
            - service: shell_command.{{ bot }}
            - delay: 1

###### switchbot mqtt tpl ######
  enable_bots_tpl:
    sequence:
      - service: mqtt.publish
        data:
          topic: 'switchbotmqtt/control'
          payload_template: "{\"id\":\"{{ bot }}\", \"value\":\"press\"}"
#      - delay: 8
#      - service: script.switchbot_update_device
#        data_template:
#          bot: "{{ bot }}"

#########################################################
#                                                                                                              #
#             Curtain Device TPL                                                                        #
#                                                                                                              #
#########################################################

#### nod.js TPL #######
  enable_cr_curtain_tpl:
    sequence:
      - repeat:
          until:
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ repeat.index % 10 == 0 }}"
                - condition: template
                  value_template: "{{ is_state('sensor.switchbot_status', 'ok') }}"
          sequence:
            - service: shell_command.computer_room_curtains_{{ modus }}
              data_template:
                position: "{{ position }}"
            - delay: 1

  enable_lr_curtain_tpl:
    sequence:
      - repeat:
          until:
            - condition: or
              conditions:
                - condition: template
                  value_template: "{{ repeat.index % 10 == 0 }}"
                - condition: template
                  value_template: "{{ is_state('sensor.switchbot_status', 'ok') }}"
          sequence:
            - service: shell_command.living_room_curtains_{{ modus }}
              data_template:
                position: "{{ position }}"
            - delay: 1

###### MQTT TPL ############
  enable_cr_curtains_tpl:
    sequence:
      - service: mqtt.publish
        data:
          topic: 'switchbotmqtt/control'
          payload_template: "{\"id\":\"{{ bot }}\", \"value\":\"{{ modus }}\"}"
      - delay: 15
#      - service: script.switchbot_update_device
#        data_template:
#          bot: "{{ bot }}"
      - service: shell_command.switchbot_updates # Nodejs
#      - delay: 5
      - service: script.switchbot_update_device
        data_template:
          bot: 'cr_curtain_rt'



  enable_lr_curtains_tpl:
    sequence:
      - service: mqtt.publish
        data:
          topic: 'switchbotmqtt/control'
          payload_template: "{\"id\":\"{{ bot }}\", \"value\":\"{{ modus }}\"}"
      - delay: 15
#      - service: script.switchbot_update_device
#        data_template:
#          bot: "{{ bot }}"
      - service: shell_command.switchbot_updates # Nodejs
#      - delay: 5
      - service: script.switchbot_update_device
        data_template:
          bot: 'lr_curtain_rt'



#########################################################
#                                                                                                              #
#             MQTT Switchbot Update Scan                                                         #
#                                                                                                              #
#########################################################

  switchbot_update_all_devices:
    sequence:
      - service: mqtt.publish
        data:
          topic: 'switchbotmqtt/rescan'
          payload_template: "{\"sec\":\"30\"}"

  switchbot_update_device:
    sequence:
      - service: mqtt.publish
        data:
          topic: 'switchbotmqtt/requestInfo'
          payload_template: "{\"id\":\"{{ bot }}\"}"

