#########################################################
#                                                                                                              
#             Bots Hold Press Mode                                                                     
#                                                                                                              
#########################################################

  holdpress_bot:
    sequence:
      - service: mqtt.publish
        data:
#          topic: 'switchbotmqtt/bot/{{ bot }}/set'
#          payload: "{{ press }}"
#          topic: 'switchbotmqtt/esp32/setHold'
          topic: 'switchbotmqtt/esp32/holdPress'
          payload: "{\"id\":\"{{ bot }}\", \"hold\":\"{{ press }}\"}"


#########################################################
#                                                                                                              
#             Humidifier API                                                                               
#                                                                                                              
#########################################################

  humidifier_low:
    sequence:
      - service: rest_command.switchbot_device_command
        data:
          deviceId: !secret switchbot_wohumi_id
          command: 'setMode'
          parameter: 101
      - service: input_boolean.turn_on
        entity_id: input_boolean.sb_humidifier          
      - service: counter.configure
        target:
          entity_id: counter.humidifier_toggle
        data:
          value: 2
        
  humidifier_med:
    sequence:
      - service: rest_command.switchbot_device_command
        data:
          deviceId: !secret switchbot_wohumi_id
          command: 'setMode'
          parameter: 102
      - service: input_boolean.turn_on
        entity_id: input_boolean.sb_humidifier          
      - service: counter.configure
        target:
          entity_id: counter.humidifier_toggle
        data:
          value: 3

  humidifier_high:
    sequence:
      - service: rest_command.switchbot_device_command
        data:
          deviceId: !secret switchbot_wohumi_id
          command: 'setMode'
          parameter: 103
      - service: input_boolean.turn_on
        entity_id: input_boolean.sb_humidifier          
      - service: counter.reset
        target:
          entity_id: counter.humidifier_toggle

  humidifier_auto:
    sequence:
      - service: rest_command.switchbot_device_command
        data:
          deviceId: !secret switchbot_wohumi_id
          command: 'setMode'
          parameter: auto
      - service: input_boolean.turn_on
        entity_id: input_boolean.sb_humidifier          
      - service: counter.configure
        target:
          entity_id: counter.humidifier_toggle
        data:
          value: 1
          
  humidifier_off:
    sequence:
      - service: rest_command.switchbot_device_command
        data:
          deviceId: !secret switchbot_wohumi_id
          command: 'turnOff'
          parameter: default
      - service: input_boolean.turn_off
        entity_id: input_boolean.sb_humidifier          
      - service: counter.reset
        target:
          entity_id: counter.humidifier_toggle

  humidifier_mode:
    sequence:
      choose:
        - conditions: "{{ is_state('counter.humidifier_toggle', '1') }}"
          sequence:
            - service: input_select.select_option
              data_template:
                entity_id: input_select.sb_humidifier_mode
                option: Low
            - service: counter.increment
              target:
                entity_id: counter.humidifier_toggle
   
                
        - conditions: "{{ is_state('counter.humidifier_toggle', '2') }}"
          sequence:
            - service: input_select.select_option
              data_template:
                entity_id: input_select.sb_humidifier_mode
                option: Med
            - service: counter.increment
              target:
                entity_id: counter.humidifier_toggle
                
        - conditions: "{{ is_state('counter.humidifier_toggle', '3') }}"
          sequence:
            - service: input_select.select_option
              data_template:
                entity_id: input_select.sb_humidifier_mode
                option: High
            - service: counter.reset
              target:
                entity_id: counter.humidifier_toggle
                
      default:                
        - service: input_select.select_option
          data_template:
            entity_id: input_select.sb_humidifier_mode
            option: Auto
        - service: counter.increment
          target:
            entity_id: counter.humidifier_toggle

  lrh_humidity_intensity_set:
    sequence:
      - service: rest_command.switchbot_device_command
        data:
          deviceId: !secret switchbot_wohumi_id
          command: 'setMode'
          parameter: "{{ states('input_number.lrh_humidity_intensity_set') }}"


