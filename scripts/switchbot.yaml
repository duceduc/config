########PRESS HOLD#################
  holdpress_bot:
    sequence:
      - service: mqtt.publish
        data:
#          topic: 'switchbotmqtt/bot/{{ bot }}/set'
#          payload: "{{ press }}"
          topic: 'switchbotmqtt/esp32/setHold'
          payload: "{\"id\":\"{{ bot }}\", \"hold\":\"{{ press }}\"}"



