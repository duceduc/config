#########################################################
#                                                                                                              
#             Speech Engine                                                                             
#                                                                                                              
#########################################################

  speech_engine:
    sequence:
      - condition: template # Quiet time is off
        value_template: "{{ is_state('binary_sensor.quiet_time', 'off') }}"
      - condition: template # Not on vacation
        value_template: "{{ is_state('input_boolean.vacation_mode', 'off') }}"        
      - condition: template # Someone is home
        value_template: "{{ is_state('input_select.home_mode', 'Home') }}"
      - service: >-
           notify.alexa_media_{{ who }}
        data:
          message: >
            {{ message }}
          data:
             type: tts


#########################################################
#                                                                                                              
#             Briefings                                                                                 
#                                                                                                              
#########################################################


  morning_briefing:
    sequence:
      - service: script.speech_engine
        data: 
          who: ai_4
          message: !include ../tpl/speech/morning_briefing.yaml

  daily_briefing:
    sequence:
      - service: script.speech_engine
        data: 
          who: ai_4
          message: !include ../tpl/speech/daily_briefing.yaml


#########################################################
#                                                                                                              
#          END OF CONFIGURATION FILE                                                             
#                                                                                                              
#########################################################