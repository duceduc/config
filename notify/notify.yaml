#########################################################
#                                                                                                              
#             Email                                                                                          
#                                                                                                              
#########################################################

  - name: home_assistant
    platform: smtp
    server: smtp.gmail.com
    port: 587
    timeout: 15
    sender: !secret gmail_email
    encryption: starttls
    username: !secret gmail_email
    password: !secret gmail_pass
    sender_name: Home Assistant    
    recipient:
      - !secret recipient_1

  - name: eri
    platform: smtp
    server: smtp.gmail.com
    port: 587
    timeout: 15
    sender: !secret gmail_email
    encryption: starttls
    username: !secret gmail_email
    password: !secret gmail_pass
    sender_name: Home Assistant    
    recipient:
      - !secret recipient_2

  - name: jcb
    platform: smtp
    server: smtp.gmail.com
    port: 587
    timeout: 15
    sender: !secret gmail_email
    encryption: starttls
    username: !secret gmail_email
    password: !secret gmail_pass
    sender_name: Duc Su    
    recipient:
      - !secret recipient_3

  - name: "Agent Desktop"
    platform: hass_agent_notifier
    resource: http://192.168.1.111:5115/notify


#########################################################
#                                                                                                              
#             Social Media                                                                                 
#                                                                                                              
#########################################################

  - name: notify-events # viber
    platform: notify_events

  - name: amberthebot
    platform: telegram
    chat_id: !secret telegram_chatid 


