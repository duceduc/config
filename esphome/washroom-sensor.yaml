# ESP8266 NodeMCU....
substitutions:
  name: washroom-sensor
  platform: ESP8266
  board: nodemcuv2

esphome:
  name: $name
  platform: $platform
  board: $board

wifi:
  ssid: !secret ssid_1
  password: !secret ssid_pass
  fast_connect : true
  power_save_mode: none
  reboot_timeout: 0s  
  manual_ip:
    static_ip: 192.168.1.93
    subnet: 255.255.255.0
    gateway: 192.168.1.1

captive_portal:

logger:

mqtt:
  topic_prefix: esphome/$name
  discovery: false
  broker: 192.168.1.20
  username: !secret mqtt_user
  password: !secret mqtt_pass

ota:
  password: !secret ota_pass

sensor:
  - platform: wifi_signal
    name: $name wifi signal

binary_sensor:
  - platform: gpio
    pin: D1
    name: 'motion $name occupancy'
    device_class: motion

