# ESP32 NodeMCU
substitutions:
  name: bed-sensor
  platform: ESP32
  board: nodemcu-32s

esphome:
  name: $name
  platform: $platform
  board: $board

wifi:
  ssid: !secret ssid_1  
  password: !secret ssid_pass
  fast_connect : true
  manual_ip:
    static_ip: 192.168.1.90
    subnet: 255.255.255.0
    gateway: 192.168.1.1

captive_portal:

logger:

#status_led:
#  pin: GPIO2

mqtt:
#  topic_prefix: esphome/$name
#  discovery: false
  broker: 192.168.1.20
  username: !secret mqtt_user
  password: !secret mqtt_pass

ota:
  password: !secret ota_pass

#esp32_ble_tracker:
#  scan_parameters:
#    interval: 20s

esp32_touch:
   setup_mode: false

sensor:
   - platform: wifi_signal
     name: $name wifi signal

binary_sensor:
   - platform: status
     name: $name status
   - platform: esp32_touch
     name: 'Top'
     pin: GPIO14
     threshold: 30
     id: top
     filters:
       - delayed_off: 1s
   - platform: esp32_touch
     name: 'Middle'
     pin: GPIO33
     threshold: 24
     id: middle
     filters:
       - delayed_off: 1s
   - platform: esp32_touch
     name: 'Bottom'
     pin: GPIO27
     threshold: 31
     id: bottom
     filters:
       - delayed_off: 1s
   - platform: template
     name: $name
     lambda: |-
       if (id(top).state ||
           id(middle).state ||
           id(bottom).state) {
         return true;
       } else {
         return false;
       }

# Presence Detection
#   - platform: ble_presence
#     mac_address: ED:5C:C3:1A:97:C6 
#     id: tms_esp32
#     name: "tms Presence esp32"

