# ESP8266 NodeMCU....
substitutions:
  name: hallway-sensor
  platform: ESP8266
  board: nodemcuv2

esphome:
  name: $name
  platform: $platform
  board: $board

wifi:
  ssid: !secret ssid_1
  password: !secret ssid_pass
  fast_connect : true
  power_save_mode: none
  reboot_timeout: 0s  
  manual_ip:
    static_ip: 192.168.1.81
    subnet: 255.255.255.0
    gateway: 192.168.1.1

captive_portal:

logger:

mqtt:
  topic_prefix: esphome/$name
  discovery: false
  broker: 192.168.1.20
  username: !secret mqtt_user
  password: !secret mqtt_pass

ota:
  password: !secret ota_pass

sensor:
  - platform: wifi_signal
    name: $name wifi signal

  - platform: adc
    pin: A0
    name: '$name illuminance'
    unit_of_measurement: lux
    update_interval: 20s
    filters:
      - lambda: |-
          return (x / 10000.0) * 2000000.0;
          
binary_sensor:
  - platform: gpio
    pin: D1
    name: 'motion hallway occupancy'
    device_class: motion
    
  - platform: gpio
    pin: D7
    name: 'motion g1 occupancy'
    device_class: motion


    