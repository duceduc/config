# ESP8266 NodeMCU....
substitutions:
  name: mdf-sensor
  platform: ESP8266
  board: nodemcuv2

esphome:
  name: $name
  platform: $platform
  board: $board

wifi:
  ssid: !secret ssid1
  password: !secret ssid_pass
  fast_connect : true
  power_save_mode: none
  reboot_timeout: 0s  
  manual_ip:
    static_ip: 192.168.1.79
    subnet: 255.255.255.0
    gateway: 192.168.1.1
  
captive_portal:
logger:

mqtt:
  topic_prefix: esphome/$name
  discovery: false
  broker: 192.168.1.20
  username: !secret mqtt_user
  password: !secret mqtt_pass

ota:
  password: !secret ota_pass

sensor:
  - platform: wifi_signal
    name: $name wifi signal
    update_interval: 15s
    filters:
      - sliding_window_moving_average:
          window_size: 15
          send_every: 15
          send_first_at: 1

  - platform: adc
    pin: A0
    name: '$name illuminance'
    unit_of_measurement: lux
    update_interval: 8s

binary_sensor:
  - platform: status
    name: "$name status"

switch:
  - platform: restart
    name: "$name Restart"
    icon: mdi:restart

