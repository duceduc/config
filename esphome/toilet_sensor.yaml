# ESP32 NodeMCU
esphome:
  name: toilet_sensor
  platform: ESP32
  board: nodemcu-32s

wifi:
  ssid: 'rice_dwarf'
  password: !secret ssid_pass
  manual_ip:
    static_ip: 192.168.1.88
    subnet: 255.255.255.0
    gateway: 192.168.1.1

# Fallback portal 
captive_portal:
# Logging
logger:
# Uncomment this if you use Home Assistant
#api:
#  password: ''

#status_led:
#  pin: GPIO2

mqtt:
  broker: 192.168.1.20
  username: !secret mqtt_user
  password: !secret mqtt_pass

ota:
  password: !secret ota_pass

# Sensors
sensor:
   - platform: dht
     pin: GPIO12
     model: AM2302
     temperature:
       name: 'Bathroom Temperature'
     humidity:
       name: 'Bathroom Humidity'
     update_interval: 60s
   - platform: wifi_signal
     name: 'Bathroom Sensor WiFi Signal'

binary_sensor:
   - platform: status
     name: Bathroom DHT Status

# Remote Control
remote_receiver:
  pin: 
    number: GPIO15
    inverted: True
    mode: INPUT_PULLUP
  dump: raw

remote_transmitter:
  pin: GPIO2
  carrier_duty_percent: 50%

switch:
