# ESP8266 NodeMCU....
substitutions:
  name: ikea-pm25
  platform: ESP8266
  board: d1_mini

esphome:
  name: $name
  platform: $platform
  board: $board

wifi:
  ssid: !secret ssid_1
  password: !secret ssid_pass
  fast_connect : true
  power_save_mode: none
#  manual_ip:
#    static_ip: 192.168.1.97
#    subnet: 255.255.255.0
#    gateway: 192.168.1.1
  
captive_portal:

logger:

api:
  password: !secret ota_pass
ota:
  password: !secret ota_pass

uart:
  - id: uart_1
    rx_pin: D2
    baud_rate: 9600
    
  - id: uart_2
    rx_pin: D3
    tx_pin: D4
    baud_rate: 9600

# Sensors
sensor:
  - platform: pm1006
    pm_2_5:
      name: $name
    uart_id: uart_1
    
  - platform: mhz19
    co2:
      name: "Carbon Dioxide"
    temperature:
      name: "$name Temperature"
    update_interval: 120s
    automatic_baseline_calibration: false
    uart_id: uart_2
    
# Danger above 50% CO    
  - platform: adc
    pin: A0
    name: "Carbon Monoxide"
    update_interval: 60s
    filters:
      - lambda: return (x * 1024/5);
    unit_of_measurement: "ppm"
    icon: mdi:fire

  - platform: wifi_signal
    name: $name wifi signal

switch:
  - platform: restart
    name: "$name Restart"
    icon: mdi:restart
    

    