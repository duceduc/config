# ESP8266 NodeMCU....
# [C4:5B:BE:70:D3:D2]
substitutions:
  name: sr-sensor
  platform: ESP8266
  board: nodemcuv2

esphome:
  name: $name
  platform: $platform
  board: $board

wifi:
#  use_address: sr_sensor.local
  ssid: !secret ssid_1
  password: !secret ssid_pass
  fast_connect : true
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.1.92
    subnet: 255.255.255.0
    gateway: 192.168.1.1

captive_portal:

logger:

api:
  password: !secret ota_pass
ota:
  password: !secret ota_pass

sensor:
  - platform: dht
    model: AM2302
    pin: D3 #Avoid D4. LED Driven. Use D3
    temperature:
      name: 'sr temperature'
    humidity:
      name: 'sr humidity'
    update_interval: 50s

  - platform: wifi_signal
    name: $name wifi signal

binary_sensor:
  - platform: status
    name: $name dht Status

  - platform: gpio
    pin: D1
    name: 'motion sr occupancy'
    device_class: motion

