# Add device controller & save. Reboot not required

#########################################################
#                                                                                                              #
#             Living Room                                                                                 #
#                                                                                                              #
#########################################################

living_room:
  module: controllerx
  class: E1810Controller
  controller: sensor.living_room_action
  integration: z2m
  light: light.living_room

living_room_curtains:
  module: controllerx
  class: E1743CoverController
  controller: sensor.lr_curtains_action
  integration: z2m
  cover: cover.living_room_curtains
  merge_mapping:
    "on": toggle_close
    "off": toggle_open
    brightness_move_up: close
    brightness_move_down: open

aio_living_room:
  module: controllerx
  class: E1810Controller
  controller: sensor.aio_controller_action
  integration: z2m
  light: light.living_room
  merge_mapping:
    brightness_up_click:
      service: script.turn_on
      data:
        entity_id: script.dining_lights_toggle

    brightness_down_click:
      service: light.toggle
      data:
        entity_id: light.living_room

    arrow_left_click:
      service: script.turn_on
      data:
        entity_id: script.lr_ac_heat_toggle
    arrow_right_click:
      service: script.turn_on
      data:
        entity_id: script.lr_ac_cool_toggle

    arrow_left_hold:
      service: script.turn_on
      data:
        entity_id: script.cr_curtain_toggle
    arrow_right_hold:
      service: script.turn_on
      data:
        entity_id: script.lr_curtain_toggle

    toggle:
      service: light.turn_off
      data:
        entity_id:
        - light.living_room
        - light.ceiling_fan_lights

#########################################################
#                                                                                                              #
#             Shower Room                                                                                #
