#########################################################
#                                                                                                              #
#             Master Room                                                                                #
#                                                                                                              #
#########################################################

master_dimmer:
  module: controllerx
  class: E1743Controller
  controller: sensor.master_dimmer_click
  integration: z2m
  light: light.m_1
  merge_mapping:
    brightness_stop:
      service: light.turn_on
      data:
        entity_id: light.master_room
    "off":
      service: light.turn_off
      data:
        entity_id:
         - light.master_room

#########################################################
