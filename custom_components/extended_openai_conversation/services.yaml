query_image:
  fields:
    config_entry:
      required: true
      selector:
        config_entry:
          integration: extended_openai_conversation
    model:
      example: gpt-4.1-mini
      selector:
        text:
    prompt:
      example: "What’s in this image?"
      required: true
      selector:
        text:
          multiline: true
    images:
      example: '{"url": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Gfp-wisconsin-madison-the-nature-boardwalk.jpg/2560px-Gfp-wisconsin-madison-the-nature-boardwalk.jpg"}'
      required: true
      default: []
      selector:
        object:
    max_tokens:
      example: 300
      default: 300
      selector:
        number:
          min: 1
          mode: box
change_config:
  fields:
    config_entry:
      required: true
      selector:
        config_entry:
          integration: extended_openai_conversation
    api_key:
      selector:
        text:
          type: password
    base_url:
      example: https://api.openai.com/v1
      selector:
        text:
    api_version:
      selector:
        text:
    organization:
      selector:
        text:
    skip_authentication:
      selector:
        boolean:
    api_provider:
      example: openai
      selector:
        select:
          options:
            - openai
            - azure
          mode: dropdown
download_skill:
  name: Download skill
  description: Download a skill from the GitHub repository and install it to the user skills directory. Available skills can be found at https://github.com/jekalmin/extended_openai_conversation/tree/develop/examples/skills
  fields:
    skill_name:
      required: true
      example: crypto
      description: Name of the skill to download (e.g., crypto, weather, calendar)
      selector:
        text:
reload_skills:
  name: Reload skills
  description: Reload all skills from the user skills directory to pick up changes or newly added skills
