get_items:
  description: Return the full list of items for an inventory. Can specify either inventory_id or inventory_name (but not both).
  fields:
    inventory_id:
      description: ID of the inventory
      example: "01JYFPCDMBRBRK4MB3C26S2FKH"
      required: false
      selector:
        text:
    inventory_name:
      description: Name of the inventory (case-insensitive)
      example: "Kitchen Freezer"
      required: false
      selector:
        text:

get_items_from_all_inventories:
  description: Return the full list of items grouped by inventory.
  fields: {}

lookup_barcode_product:
  description: Look up a barcode in an external product database (e.g. Open Food Facts) and return product information.
  fields:
    barcode:
      description: Barcode to look up (UPC, EAN, etc.). Must be quoted in YAML if it has leading zeros.
      example: "012345678901"
      required: true
      selector:
        text:

lookup_by_barcode:
  description: Look up an item by barcode across all inventories. Returns all matching items.
  fields:
    barcode:
      description: Barcode to search for (UPC, EAN, etc.). Must be quoted in YAML if it has leading zeros.
      example: "012345678901"
      required: true
      selector:
        text:

scan_barcode:
  description: Scan a barcode and perform an action (increment, decrement, or lookup). Automatically resolves the item across inventories.
  fields:
    barcode:
      description: Barcode to scan (UPC, EAN, etc.). Must be quoted in YAML if it has leading zeros.
      example: "012345678901"
      required: true
      selector:
        text:
    action:
      description: Action to perform on the matched item
      example: "increment"
      required: true
      selector:
        select:
          options:
            - "increment"
            - "decrement"
            - "lookup"
    amount:
      description: Amount to increment or decrement by (ignored for lookup)
      example: 1
      required: false
      default: 1
      selector:
        number:
          min: 0.1
          step: 0.1
    inventory_id:
      description: Optional inventory ID to scope the search. Required if the barcode exists in multiple inventories.
      example: "01JYFPCDMBRBRK4MB3C26S2FKH"
      required: false
      selector:
        text:
    price:
      description: Unit price to record for this transaction
      example: 4.99
      required: false
      selector:
        number:
          min: 0
          step: 0.01

get_inventory_consumption_rates:
  description: Get consumption analytics for all items in an inventory based on their decrement history. Returns daily/weekly rates, days until depletion, and average restock interval per item.
  fields:
    inventory_id:
      description: ID of the inventory
      example: "01JYFPCDMBRBRK4MB3C26S2FKH"
      required: true
      selector:
        text:
    window_days:
      description: Number of days to look back for consumption data. Omit to use all history.
      example: 30
      required: false
      selector:
        number:
          min: 1
          step: 1

get_item_consumption_rates:
  description: Get consumption analytics for a specific item based on its decrement history. Returns daily/weekly rates, days until depletion, and average restock interval.
  fields:
    inventory_id:
      description: ID of the inventory
      example: "01JYFPCDMBRBRK4MB3C26S2FKH"
      required: true
      selector:
        text:
    name:
      description: Name of the item
      example: "Frozen Pizza"
      required: true
      selector:
        text:
    window_days:
      description: Number of days to look back for consumption data. Omit to use all history.
      example: 30
      required: false
      selector:
        number:
          min: 1
          step: 1
