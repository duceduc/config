add_item:
  description: Add an item to an inventory
  fields:
    inventory_id:
      description: ID of the inventory to add to
      example: "01JYFPCDMBRBRK4MB3C26S2FKH"
      required: true
      selector:
        text:
    name:
      description: Name of the item
      example: "Frozen Pizza"
      required: true
      selector:
        text:
    barcode:
      description: Barcode to associate with the item (UPC, EAN, etc.). Must be quoted in YAML if it has leading zeros.
      example: "012345678901"
      required: false
      default: ""
      selector:
        text:
    quantity:
      description: Quantity of the item
      example: 2.5
      required: false
      default: 1
      selector:
        number:
          min: 0
          step: 0.1
    unit:
      description: Unit of measurement
      example: "boxes"
      required: false
      default: ""
      selector:
        text:
    price:
      description: Unit price of the item
      example: 4.99
      required: false
      default: 0
      selector:
        number:
          min: 0
          step: 0.01
    category:
      description: Category of the item. Supports multiple categories as a comma-separated list.
      example: "Prepared Foods, Frozen"
      required: false
      default: ""
      selector:
        text:
    expiry_date:
      description: Expiration date
      example: "2025-12-31"
      required: false
      default: ""
      selector:
        date:
    expiry_alert_days:
      description: Number of days in advance to warn about expiring items
      example: 7
      required: false
      default: 0
      selector:
        number:
          min: 0
    auto_add_enabled:
      description: Enable automatic adding to todo list
      example: true
      required: false
      default: false
      selector:
        boolean:
    auto_add_to_list_quantity:
      description: Quantity threshold for auto-adding
      example: 1
      required: false
      default: 0
      selector:
        number:
          min: 0
    desired_quantity:
      description: Desired stock level for restocking. When set, the todo item quantity will be the difference between this and the current quantity. When 0, the quantity is based on the auto-add threshold instead.
      example: 10
      required: false
      default: 0
      selector:
        number:
          min: 0
    todo_list:
      description: Todo list entity to add to
      example: "todo.grocery_list"
      required: false
      default: ""
      selector:
        entity:
          domain: todo
    location:
      description: Location of the item. Supports multiple locations as a comma-separated list.
      example: "Basement Refrigerator, Kitchen Pantry"
      required: false
      default: ""
      selector:
        text:
    description:
      description: Item description
      example: "Junk food"
      required: false
      default: ""
      selector:
        text:
          multiline: true
    auto_add_id_to_description_enabled:
      description: Appends the inventory ID to the description
      example: true
      required: false
      default: false
      selector:
        boolean:
    todo_quantity_placement:
      description: Where to show the quantity in todo items. "name" puts it in the item name (e.g. "Milk (x4)"), "description" puts it in the description field, "none" omits it entirely.
      example: "description"
      required: false
      default: "name"
      selector:
        select:
          options:
            - "name"
            - "description"
            - "none"

remove_item:
  description: Remove an item from an inventory
  fields:
    inventory_id:
      description: ID of the inventory to remove from
      example: "01JYFPCDMBRBRK4MB3C26S2FKH"
      required: true
      selector:
        text:
    name:
      description: Name of the item to remove (required unless barcode is provided)
      example: "Frozen Pizza"
      required: false
      selector:
        text:
    barcode:
      description: Barcode of the item to remove (alternative to name). Must be quoted in YAML if it has leading zeros.
      example: "012345678901"
      required: false
      selector:
        text:

increment_item:
  description: Increment the quantity of an item
  fields:
    inventory_id:
      description: ID of the inventory
      example: "01JYFPCDMBRBRK4MB3C26S2FKH"
      required: true
      selector:
        text:
    name:
      description: Name of the item (required unless barcode is provided)
      example: "Frozen Pizza"
      required: false
      selector:
        text:
    barcode:
      description: Barcode of the item (alternative to name). Must be quoted in YAML if it has leading zeros.
      example: "012345678901"
      required: false
      selector:
        text:
    amount:
      description: Amount to increment by
      example: 0.5
      required: false
      default: 1
      selector:
        number:
          min: 0.1
          step: 0.1
    price:
      description: Unit price to record for this transaction
