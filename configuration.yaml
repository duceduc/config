#########################################################

alexa_media:
  accounts:
    - email: !secret amazon_user
      password: !secret amazon_password
      url: amazon.com
      include_devices:
       - Ai.1
       - Ai.2
       - Ai.3
# Find Amazon dot name
# https://alexa.amazon.com/api/devices-v2/device

telegram_bot:
  - platform: polling
    api_key: !secret telegram_apikey
    allowed_chat_ids:
     - !secret telegram_chatid
     - !secret telegram_userid

utility_meter:
  energy_t31_light_and_power_monthly:
    source: sensor.shelly_t31_total_energy
    cycle: monthly
    offset:
      days: 2
  energy_t31_light_and_power:
    source: sensor.shelly_t31_total_energy
    cycle: daily
    tariffs:
     - day
     - night
  energy_t41_heating:
    source: sensor.shelly_t41_total_energy
    cycle: daily
    tariffs:
     - day
     - night

  energy_washer_power_monthly:
    source: sensor.shelly_washer_total_energy
    cycle: monthly
    offset:
      days: 2

  energy_washer_daily_power:
    source: sensor.shelly_washer_total_energy
    cycle: daily

counter:
  dining_lights_toggle:
    initial: 1
    step: 1

input_text:
  slack_app_verification_token:
    initial: !secret slack_app_verification_token
    mode: password

  alexa_actionable_notification:
    name: Alexa Actionable Notification Holder
    max: 255
    initial: '{"text": "This is a test of the alexa actions custom skill. Did it work?", "event": "actionable.skill.test"}'

#################
  status_fan_speed:
    name: Status Fan Speed



fan:
  - platform: template
    fans:
      yuasa_fan:
        speed_count: 3
        value_template: "{{ states('input_boolean.status_fan_power') }}"
        percentage_template: "{{ states('input_text.status_fan_speed') | int }}"
        turn_on:
          - condition: state
            entity_id: input_boolean.status_fan_power
            state: 'off'
          - service: remote.send_command
            data:
              entity_id: remote.rm4_remote
              device: Yuasa Fan
              command: power
          - service: input_boolean.turn_on
            entity_id: input_boolean.status_fan_power
        turn_off:
          - service: remote.send_command
            data:
              entity_id: remote.rm4_remote
              device: Yuasa Fan
              command: power
          - service: input_boolean.turn_off
            entity_id: input_boolean.status_fan_power

        set_percentage:
          - service: python_script.fan_speed_control
            data_template:
              fan_speed: "{{ percentage }}"
              fan_speed_entity_id: 'input_text.status_fan_speed'
              fan_entity_id: 'fan.yuasa_fan'
              fan_speed_count: 3
              service_domain: 'remote'
              service: 'send_command'
              service_data_increase:
                entity_id: remote.rm4_remote
                device: Yuasa Fan
                command: speed
              service_data_decrease:
                entity_id: remote.rm4_remote
                device: Yuasa Fan
                command: speed


#################


rest_command:
  slack_api:
    url: https://slack.com/api/{{ api }}
    content_type: 'application/json; charset=utf-8'
    verify_ssl: true
    method: 'post'
    timeout: 20
    headers:
      Authorization: !secret slackbot_token
    payload: '{{ payload }}'

# Slack URL '***-ga64322.slack.com'
  slack_response:
    url: '{{ response_url }}'
    content_type: 'application/json; charset-utf-8'
    verify_ssl: true
    method: 'post'
    timeout: 20
    payload: >
      {
         "replace_original": '{{ replace_original if (replace_original is defined) else 'true' }}',
        "text": "{{ message | default('') }}",
        "attachments": {{ attachments if (attachments is defined) else '[]' }}
      }


