#########################################################
#                                                                                                              #
#             Sensor Integrations                                                                       #
#                                                                                                              #
#########################################################

rest:
  - resource: !secret crt_search
    scan_interval: 14400
    sensor:
      - name: vj ssl cert issued
        value_template: "{{ value_json[0].entry_timestamp }}"
        device_class: timestamp
      - name: vj ssl cert issuer
        value_template: "{{ value_json[0].issuer_name }}"
      - name: vj ssl cert cn
        value_template: "{{ value_json[0].common_name }}"

